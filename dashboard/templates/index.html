  );
}

function PcapResultsView({ data, onReset }) {
  const [tab, setTab]       = useState('overview');
  const [ipPanel, setIpPanel] = useState(null);
  const { meta } = data;

  const exportCSV = () => {
    const cols = ['timestamp','severity','rule','src_ip','dst_ip','dst_port','protocol','threat_score'];
    const rows = [cols.join(','), ...(data.alerts||[]).map(a=>
      cols.map(c=>`"${String(a[c]??'').replace(/"/g,'""')}"`).join(','))];
    const blob = new Blob([rows.join('\n')],{type:'text/csv'});
    const url  = URL.createObjectURL(blob);
    const el   = document.createElement('a');
    el.href = url;
    el.download = (meta.pcap_file||'nids').replace(/\.pcap.*$/,'')+'_alerts.csv';
    el.click();
    URL.revokeObjectURL(url);
  };

  const TABS = [
    {id:'overview',  label:'Overview'},
    {id:'alerts',    label:`Alerts (${meta.total_alerts})`},
    {id:'attackers', label:'Attackers'},
    {id:'timeline',  label:'Timeline'},
  ];

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',gap:2,padding:'0 16px',height:44,
        background:'var(--bg2)',borderBottom:'1px solid var(--border)',flexShrink:0}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            padding:'5px 14px',borderRadius:5,fontSize:12,fontWeight:500,cursor:'pointer',
            color:tab===t.id?'var(--cyan)':'var(--text2)',
            background:tab===t.id?'rgba(0,212,255,0.08)':'transparent',
            border:tab===t.id?'1px solid rgba(0,212,255,0.18)':'1px solid transparent',
            transition:'all .15s'}}>
            {t.label}
          </button>
        ))}
        <div style={{flex:1}}/>
        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:'var(--text3)',marginRight:8}}>
          {meta.first_ts} → {meta.last_ts}
        </span>
        <button onClick={exportCSV} style={{display:'flex',alignItems:'center',gap:5,padding:'5px 11px',
          borderRadius:6,background:'var(--bg4)',border:'1px solid var(--border-md)',
          color:'var(--text1)',fontSize:11,fontWeight:500,cursor:'pointer',marginRight:6}}>
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" width="13" height="13">
            <path d="M8 2v8M5 7l3 3 3-3"/><path d="M3 11v2h10v-2"/>
          </svg>
          Export CSV
        </button>
        <button onClick={onReset} style={{display:'flex',alignItems:'center',gap:5,padding:'5px 11px',
          borderRadius:6,background:'rgba(0,212,255,0.08)',border:'1px solid rgba(0,212,255,0.2)',
          color:'var(--cyan)',fontSize:11,fontWeight:500,cursor:'pointer'}}>
          New Analysis
        </button>
      </div>
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {tab==='overview'  && <PcapOverviewTab  data={data}/>}
        {tab==='alerts'    && <PcapAlertsTab    alerts={data.alerts||[]} onInvestigate={setIpPanel}/>}
        {tab==='attackers' && <PcapAttackersTab topIps={data.top_ips||[]} onInvestigate={setIpPanel}/>}
        {tab==='timeline'  && <PcapTimelineTab  data={data}/>}
      </div>
      {ipPanel && <PcapIpPanel ip={ipPanel} onClose={()=>setIpPanel(null)}/>}
    </div>
  );
}

function PcapView() {
  const [status, setStatus] = useState({status:'idle',pcap_name:'',error:null});
  const [data,   setData]   = useState(null);
  const pollRef = useRef(null);

  const stopPoll = () => { clearInterval(pollRef.current); pollRef.current=null; };

  const checkStatus = useCallback(async () => {
    try {
      const s = await fetch('/pcap/api/status').then(r=>r.json());
      setStatus(s);
      if(s.status==='done') {
        stopPoll();
        const d = await fetch('/pcap/api/data').then(r=>r.json());
        setData(d);
      } else if(s.status==='error'||s.status==='idle') {
        stopPoll();
      } else if(s.status==='running' && !pollRef.current) {
        pollRef.current = setInterval(checkStatus, 1500);
      }
    } catch(e) {}
  }, []);

  useEffect(()=>{ checkStatus(); return stopPoll; },[]);

  const handleFile = async (file) => {
    stopPoll();
    setStatus({status:'running',pcap_name:file.name,error:null});
    setData(null);
    const fd = new FormData();
    fd.append('pcap', file);
    try {
      const res    = await fetch('/pcap/upload',{method:'POST',body:fd});
      const result = await res.json();
      if(result.status==='done') {
        const d = await fetch('/pcap/api/data').then(r=>r.json());
        setData(d);
        setStatus({status:'done',pcap_name:file.name,error:null});
      } else {
        setStatus({status:'error',pcap_name:file.name,error:result.error||'Analysis failed'});
      }
    } catch(err) {
      setStatus({status:'error',pcap_name:file.name,error:err.message||'Network error'});
    }
  };

  const handleReset = () => {
    fetch('/pcap/reset').catch(()=>{});
    setStatus({status:'idle',pcap_name:'',error:null});
    setData(null);
  };

  if(status.status==='idle')                    return <PcapUploadScreen onFile={handleFile}/>;
  if(status.status==='running')                 return <PcapAnalyzingScreen filename={status.pcap_name}/>;
  if(status.status==='error')                   return <PcapErrorScreen message={status.error||'Unknown error'} onReset={handleReset}/>;
  if(status.status==='done' && data)            return <PcapResultsView data={data} onReset={handleReset}/>;
  return null;
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [alerts,setAlerts]               = useState(()=>nidsGenHistory());
  const [newIds,setNewIds]               = useState(new Set());
  const [paused,setPaused]               = useState(false);
  const [nav,setNav]                     = useState("dashboard");
  const [filter,setFilter]               = useState({sev:"",cat:"",ip:"",rule:""});
  const [uptime,setUptime]               = useState("0:00:00");
  const [queuePct,setQueue]              = useState(13);
  const [pktRate,setPktRate]             = useState(87);
  const [toasts,setToasts]               = useState([]);
  const [blockedIPs,setBlockedIPs]       = useState(new Set());
  const [allowlistEntries,setAllowlist]  = useState([]);
  const [showShortcuts,setShowShortcuts] = useState(false);
  const [investigateIP,setInvestigateIP] = useState(null);
  const [apiMode,setApiMode]             = useState(false);
  const [health,setHealth]               = useState(null);
  const [captureStatus,setCaptureStatus] = useState(null);
  const [theme,setTheme]                 = useState(()=>localStorage.getItem("nids-theme")||"dark");
  const [sidebarCollapsed, setSidebarCollapsed] = useState(()=>localStorage.getItem("nids-col")==="1");
  const toggleSidebar = useCallback(()=>setSidebarCollapsed(c=>{ const n=!c; localStorage.setItem("nids-col",n?"1":"0"); return n; }),[]);
  const startRef   = useRef(Date.now());
  const ruleSearch = useRef(null);

  useEffect(()=>{
    document.documentElement.classList.toggle("light",theme==="light");
    localStorage.setItem("nids-theme",theme);
  },[theme]);

  const toggleTheme=useCallback(()=>setTheme(t=>t==="dark"?"light":"dark"),[]);

  const [tweaks, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{
    "refreshInterval": 5,
    "maxRows":         80,
    "toastCritOnly":   false,
    "compactMode":     false
  }/*EDITMODE-END*/);

  const refreshAllowlist = useCallback(async () => {
    const data = await nidsFetchAllowlist();
    if (data != null) setAllowlist(data);
  }, []);

  // On mount: try to connect to real backend
  useEffect(()=>{
    nidsFetchHealth().then(h=>{
      if(h){ setHealth(h); }
    });
    nidsFetchAlerts(500).then(data=>{
      if(data&&data.length>0){
        setApiMode(true);
        setAlerts(data);
      }
    });
    refreshAllowlist();
  },[]);

  // Poll capture engine status every 5 s
  useEffect(()=>{
    const poll = async () => {
      const s = await nidsFetchCaptureStatus();
      if (s) setCaptureStatus(s);
    };
    poll();
    const iv = setInterval(poll, 5000);
    return () => clearInterval(iv);
  },[]);

  const handleCaptureStart = useCallback(async (iface) => {
    const res = await nidsStartCapture(iface);
    if (!res.error) {
      setCaptureStatus(s => ({...(s||{}), running:true, pid:res.pid, interface:iface, external:false, uptime_s:0}));
    }
    return res;
  },[]);

  const handleCaptureStop = useCallback(async () => {
    const res = await nidsStopCapture();
    if (!res.error) {
      setCaptureStatus(s => ({...(s||{}), running:false, pid:null, uptime_s:0}));
    }
    return res;
  },[]);

  // Block / unblock
  const handleBlock=useCallback((ip)=>{
    setBlockedIPs(s=>{const n=new Set(s);n.has(ip)?n.delete(ip):n.add(ip);return n;});
  },[]);

  // Investigate — open drawer
  const handleInvestigate=useCallback((ip)=>{
    setInvestigateIP(ip);
  },[]);

  // Live feed — use real API when connected, simulation otherwise
  useEffect(()=>{
    if(paused)return;
    const iv=setInterval(async ()=>{
      if(apiMode){
        const since=alerts[0]?.timestamp;
        const fresh=await nidsFetchAlerts(50, since?{since}:{});
        if(fresh&&fresh.length>0){
          setAlerts(prev=>[...fresh,...prev].slice(0,800));
          const ids=new Set(fresh.map(a=>a.id));
          setNewIds(s=>new Set([...s,...ids]));
          setTimeout(()=>setNewIds(s=>{const c=new Set(s);ids.forEach(id=>c.delete(id));return c;}),3000);
          const noteworthy=fresh.filter(a=>tweaks.toastCritOnly?a.severity==="CRITICAL":["CRITICAL","HIGH"].includes(a.severity));
          if(noteworthy.length)setToasts(t=>[...noteworthy.slice(0,2),...t].slice(0,5));
        }
      } else {
        const n=Math.floor(Math.random()*3)+1;
        const batch=Array.from({length:n},()=>nidsGenAlert(new Date()));
        setAlerts(prev=>[...batch,...prev].slice(0,600));
        const ids=new Set(batch.map(a=>a.id));
        setNewIds(s=>new Set([...s,...ids]));
        setTimeout(()=>setNewIds(s=>{const c=new Set(s);ids.forEach(id=>c.delete(id));return c;}),3000);
        const noteworthy=batch.filter(a=>tweaks.toastCritOnly?a.severity==="CRITICAL":["CRITICAL","HIGH"].includes(a.severity));
        if(noteworthy.length)setToasts(t=>[...noteworthy.slice(0,2),...t].slice(0,5));
      }
      setQueue(q=>Math.max(2,Math.min(90,q+Math.round(Math.random()*8-4))));
      setPktRate(r=>Math.max(20,Math.min(580,r+Math.round(Math.random()*40-20))));
    },(tweaks.refreshInterval||5)*1000);
    return()=>clearInterval(iv);
  },[paused,apiMode,tweaks.refreshInterval,tweaks.toastCritOnly,alerts]);

  // Toast auto-dismiss
  useEffect(()=>{
    if(!toasts.length)return;
    const iv=setTimeout(()=>setToasts(t=>t.slice(0,-1)),6000);
    return()=>clearTimeout(iv);
  },[toasts]);

  // Uptime ticker
  useEffect(()=>{
    const iv=setInterval(()=>{
      const s=Math.floor((Date.now()-startRef.current)/1000);
      setUptime(`${Math.floor(s/3600)}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`);
    },1000);
    return()=>clearInterval(iv);
  },[]);

  // Keyboard shortcuts
  useEffect(()=>{
    const h=e=>{
      if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT")return;
      switch(e.key.toLowerCase()){
        case "p":   setPaused(x=>!x); break;
        case "e":   nidsExportCSV(alerts); break;
        case "c":   setFilter({sev:"",cat:"",ip:"",rule:""}); break;
        case "t":   toggleTheme(); break;
        case "/":   e.preventDefault(); ruleSearch.current?.focus(); break;
        case "?":   setShowShortcuts(x=>!x); break;
        case "escape":
          setShowShortcuts(false);
          setInvestigateIP(null);
          break;
        case "1": setNav("dashboard"); break;
        case "2": setNav("alerts");    break;
        case "3": setNav("map");       break;
        case "4": setNav("rules");     break;
        case "5": setNav("analytics"); break;
        case "6": setNav("allowlist"); break;
        case "7": setNav("pcap");      break;
      }
    };
    window.addEventListener("keydown",h);
    return()=>window.removeEventListener("keydown",h);
  },[alerts]);

  const critCount=alerts.filter(a=>a.severity==="CRITICAL"&&Date.now()-new Date(a.timestamp)<3600000).length;
  const dropRate=(queuePct*0.017).toFixed(1);
  const viewProps={alerts,paused,setPaused,filter,setFilter,newIds,tweaks,blockedIPs,onBlock:handleBlock,onInvestigate:handleInvestigate,ruleSearchRef:ruleSearch,pktRate,apiMode};

  const openTweaks=()=>window.postMessage({type:"__activate_edit_mode"},"*");

  return (
    <div style={{display:"flex",height:"100vh",width:"100vw",overflow:"hidden"}}>
      <Sidebar active={nav} setActive={setNav} critCount={critCount} blockedCount={blockedIPs.size} allowlistCount={allowlistEntries.length} health={health} apiMode={apiMode} captureStatus={captureStatus} onCaptureStart={handleCaptureStart} onCaptureStop={handleCaptureStop} collapsed={sidebarCollapsed} onToggle={toggleSidebar}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
        <Header active={nav} paused={paused} onExport={()=>nidsExportCSV(alerts)} onShortcuts={()=>setShowShortcuts(x=>!x)} onTweaks={openTweaks} onTheme={toggleTheme} theme={theme} apiMode={apiMode}/>
        <StatusBar queuePct={queuePct} dropRate={dropRate} uptime={uptime} pktRate={pktRate} health={health} apiMode={apiMode} captureStatus={captureStatus}/>
        <div style={{flex:1,overflow:"hidden",background:"var(--bg2)"}}>
          {nav==="dashboard" && <DashboardView {...viewProps}/>}
          {nav==="alerts"    && <AlertsView    {...viewProps}/>}
          {nav==="map"       && <MapView alerts={alerts} onInvestigate={handleInvestigate}/>}
          {nav==="rules"     && <RulesView     alerts={alerts}/>}
          {nav==="analytics" && <AnalyticsView alerts={alerts}/>}
          {nav==="allowlist" && <AllowlistView entries={allowlistEntries} onRefresh={refreshAllowlist} apiMode={apiMode}/>}
          {nav==="pcap"      && <PcapView/>}
        </div>
      </div>

      {/* Investigate drawer */}
      {investigateIP&&(
        <InvestigateDrawer
          ip={investigateIP}
          alerts={alerts}
          blockedIPs={blockedIPs}
          onBlock={handleBlock}
          onClose={()=>setInvestigateIP(null)}
        />
      )}

      <ToastContainer toasts={toasts} dismiss={id=>setToasts(t=>t.filter(x=>x.id!==id))}/>
      {showShortcuts&&<ShortcutsOverlay onClose={()=>setShowShortcuts(false)}/>}

      <TweaksPanel title="Settings">
        <TweakSection label="Live Feed">
          <TweakSlider label="Refresh (s)"      value={tweaks.refreshInterval} min={1}  max={60}  step={1}  onChange={v=>setTweak("refreshInterval",v)}/>
          <TweakSlider label="Max Rows"          value={tweaks.maxRows}         min={20} max={300} step={10} onChange={v=>setTweak("maxRows",v)}/>
          <TweakToggle label="Toast: Crit only"  value={tweaks.toastCritOnly}   onChange={v=>setTweak("toastCritOnly",v)}/>
        </TweakSection>
        <TweakSection label="Display">
          <TweakToggle label="Compact Mode" value={tweaks.compactMode} onChange={v=>setTweak("compactMode",v)}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
