<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NIDS — Network Intrusion Detection System</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="/static/nids-data.js"></script>
<script type="text/babel" src="/static/tweaks-panel.jsx"></script>
<script type="text/babel" src="/static/nids-ui.jsx"></script>
<script type="text/babel" src="/static/nids-charts.jsx"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg0:#060810; --bg1:#090c16; --bg2:#0d1220; --bg3:#111828; --bg4:#16202e; --bg5:#1c2a3c;
  --border:rgba(255,255,255,0.06); --border-md:rgba(255,255,255,0.1); --border-hi:rgba(255,255,255,0.16);
  --text0:#eef2f8; --text1:#8fa3be; --text2:#4e6278; --text3:#2d3f52;
  --cyan:#00d4ff; --green:#00dfa0; --red:#ff3355; --orange:#ff7c2a; --amber:#ffbe2e; --blue:#4a8fff; --purple:#9b6fff;
}
html.light {
  --bg0:#f0f4f9; --bg1:#e8edf5; --bg2:#dde4ef; --bg3:#d0d9ea; --bg4:#c5cfdf; --bg5:#b5c0d3;
  --border:rgba(0,0,0,0.07); --border-md:rgba(0,0,0,0.13); --border-hi:rgba(0,0,0,0.2);
  --text0:#0d1520; --text1:#2d4a6a; --text2:#5a7a9e; --text3:#8ca5c0;
  --cyan:#007db8; --green:#00a070; --red:#d42040; --orange:#c95a00; --amber:#c08000; --blue:#2060d0; --purple:#6b3fcc;
}
html,body { height:100%; overflow:hidden; background:var(--bg0); color:var(--text0); font-family:'Inter',sans-serif; font-size:13px; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0; background-image:radial-gradient(circle,rgba(0,212,255,0.035) 1px,transparent 1px); background-size:28px 28px; }
html.light body::before { background-image:radial-gradient(circle,rgba(0,0,0,0.04) 1px,transparent 1px); }
::-webkit-scrollbar { width:3px; height:3px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--bg5); border-radius:2px; }
button { cursor:pointer; border:none; background:none; color:inherit; font:inherit; }
input,select { font:inherit; color:inherit; background:var(--bg4); border:1px solid var(--border-md); border-radius:6px; padding:5px 10px; outline:none; transition:border-color .15s,box-shadow .15s; }
input:focus,select:focus { border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,212,255,0.1); }
select option { background:var(--bg3); }
@keyframes nids-pulse       { 0%,100%{opacity:1}50%{opacity:0.3} }
@keyframes nids-glow-pulse  { 0%,100%{box-shadow:0 0 14px rgba(255,51,85,0.18)}50%{box-shadow:0 0 32px rgba(255,51,85,0.38)} }
@keyframes nids-toast-in    { from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none} }
@keyframes nids-ring-pulse  { 0%,100%{opacity:0.35;transform:scale(1)}50%{opacity:0.1;transform:scale(1.4)} }
@keyframes nids-row-in      { from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none} }
@keyframes nids-slide-in    { from{transform:translateX(100%)}to{transform:none} }
tbody tr { transition:background .1s; }
tbody tr:hover { background:rgba(255,255,255,0.025) !important; }
</style>
</head>
<body>
<div id="root" style="position:relative;z-index:1;height:100vh;"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
const NAV = [
  { id:"dashboard", label:"Dashboard",  icon:<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6" width="16" height="16"><rect x="2" y="2" width="6" height="6" rx="1.5"/><rect x="12" y="2" width="6" height="6" rx="1.5"/><rect x="2" y="12" width="6" height="6" rx="1.5"/><rect x="12" y="12" width="6" height="6" rx="1.5"/></svg> },
  { id:"alerts",    label:"Alert Feed", icon:<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6" width="16" height="16"><path d="M8.57 3.22L2 14a1.67 1.67 0 001.43 2.5H16.57A1.67 1.67 0 0018 14L11.43 3.22a1.67 1.67 0 00-2.86 0z"/><line x1="10" y1="8" x2="10" y2="11"/><circle cx="10" cy="13.5" r=".75" fill="currentColor"/></svg> },
  { id:"map",       label:"Attack Map", icon:<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6" width="16" height="16"><circle cx="10" cy="10" r="8"/><path d="M2 10h16M10 2a14.5 14.5 0 000 16M10 2a14.5 14.5 0 010 16"/></svg> },
  { id:"rules",     label:"Rules",      icon:<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6" width="16" height="16"><path d="M10 18s7-3.5 7-8.75V4.25L10 2 3 4.25V9.25C3 14.5 10 18 10 18z"/></svg> },
  { id:"analytics", label:"Analytics",  icon:<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6" width="16" height="16"><polyline points="18 10 15 10 12.5 17.5 7.5 2.5 5 10 2 10"/></svg> },
  { id:"allowlist", label:"Allowlist",  icon:<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6" width="16" height="16"><path d="M10 18s7-3.5 7-8.75V4.25L10 2 3 4.25V9.25C3 14.5 10 18 10 18z"/><polyline points="6.5 10 9 12.5 13.5 7.5"/></svg> },
  { id:"pcap",      label:"PCAP Analysis", icon:<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6" width="16" height="16"><path d="M12 2H5a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V8z"/><path d="M12 2v6h6"/><path d="M7 12h6M7 15h4"/></svg> },
];

function CapturePanel({ captureStatus, onCaptureStart, onCaptureStop }) {
  const [ifaceInput, setIfaceInput] = useState(captureStatus?.interface || "wlan0");
  const [busy, setBusy] = useState(false);
  const [err, setErr]   = useState(null);

  const running  = captureStatus?.running ?? false;
  const external = captureStatus?.external ?? false;
  const uptime_s = captureStatus?.uptime_s ?? 0;

  const fmtUptime = s => {
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
    return `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
  };

  const handleStart = async () => {
    setBusy(true); setErr(null);
    const res = await onCaptureStart(ifaceInput);
    if (res?.error) setErr(res.error);
    setBusy(false);
  };
  const handleStop = async () => {
    setBusy(true); setErr(null);
    const res = await onCaptureStop();
    if (res?.error) setErr(res.error);
    setBusy(false);
  };

  const dotColor = running ? "var(--green)" : "var(--text3)";
  const btnStyle = running
    ? {background:"rgba(255,51,85,0.1)",border:"1px solid rgba(255,51,85,0.3)",color:"var(--red)"}
    : {background:"rgba(0,223,160,0.1)",border:"1px solid rgba(0,223,160,0.3)",color:"var(--green)"};

  return (
    <div style={{margin:"8px",borderRadius:8,background:"var(--bg2)",border:"1px solid var(--border)",padding:"10px 10px 8px"}}>
      <div style={{fontSize:9,fontWeight:700,color:"var(--text3)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8}}>Capture Engine</div>

      {/* Status row */}
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
        <LiveDot color={dotColor} size={7} animate={running}/>
        <span style={{fontSize:11,fontWeight:600,fontFamily:"'JetBrains Mono',monospace",
          color:running?"var(--green)":"var(--text3)",flex:1}}>
          {running ? "RUNNING" : "STOPPED"}
        </span>
        {running && external && (
          <span style={{fontSize:8,color:"var(--text2)",fontFamily:"'JetBrains Mono',monospace"}}>EXT</span>
        )}
      </div>

      {/* Running info or interface input */}
      {running ? (
        <div style={{marginBottom:7}}>
          <div style={{fontSize:9,color:"var(--text2)",fontFamily:"'JetBrains Mono',monospace",marginBottom:2}}>
            iface: <span style={{color:"var(--cyan)"}}>{captureStatus?.interface || "?"}</span>
          </div>
          {!external && uptime_s > 0 && (
            <div style={{fontSize:9,color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace"}}>
              up {fmtUptime(uptime_s)}
            </div>
          )}
          {captureStatus?.pid && (
            <div style={{fontSize:9,color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace"}}>
              pid {captureStatus.pid}
            </div>
          )}
        </div>
      ) : (
        <div style={{marginBottom:7}}>
          <div style={{fontSize:9,color:"var(--text3)",marginBottom:3}}>Interface</div>
          <input
            value={ifaceInput}
            onChange={e=>setIfaceInput(e.target.value)}
            placeholder="wlan0"
            style={{width:"100%",fontSize:11,padding:"4px 7px",fontFamily:"'JetBrains Mono',monospace"}}
          />
        </div>
      )}

      {/* Start / Stop button */}
      <button
        onClick={running ? handleStop : handleStart}
        disabled={busy}
        style={{width:"100%",padding:"6px",borderRadius:5,fontSize:11,fontWeight:600,
          cursor:busy?"wait":"pointer",opacity:busy?0.6:1,...btnStyle}}
      >
        {busy ? "…" : running ? "⏹ Stop Capture" : "▶ Start Capture"}
      </button>

      {/* Error message */}
      {err && (
        <div style={{marginTop:6,fontSize:9,color:"var(--red)",lineHeight:1.4,wordBreak:"break-word"}}
             title={err}>
          {err.length>120 ? err.slice(0,117)+"…" : err}
        </div>
      )}
    </div>
  );
}

function Sidebar({ active, setActive, critCount, blockedCount, allowlistCount, health, apiMode, captureStatus, onCaptureStart, onCaptureStop, collapsed, onToggle }) {
  const iface = health?.interface || "—";
  const ruleCount = health?.rules_active || NIDS_RULES.length;

  const toggleBtn = (
    <button onClick={onToggle} title={collapsed?"Expand sidebar":"Collapse sidebar"} style={{
      display:"flex",alignItems:"center",justifyContent:"center",
      width:28,height:28,borderRadius:6,border:"1px solid var(--border-md)",
      color:"var(--text3)",flexShrink:0,transition:"all .15s",
    }}>
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" width="12" height="12">
        {collapsed
          ? <path d="M6 3l5 5-5 5"/>
          : <path d="M10 3L5 8l5 5"/>}
      </svg>
    </button>
  );

  if (collapsed) {
    return (
      <div style={{width:52,background:"var(--bg1)",borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",flexShrink:0,alignItems:"center"}}>
        <div style={{height:52,display:"flex",alignItems:"center",justifyContent:"center",borderBottom:"1px solid var(--border)",flexShrink:0,width:"100%"}}>
          <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
            <circle cx="12" cy="12" r="9" stroke="#00d4ff" strokeWidth="1.5"/>
            <circle cx="12" cy="12" r="5" stroke="#00d4ff" strokeWidth="1" strokeDasharray="2 2"/>
            <circle cx="12" cy="12" r="2" fill="#00d4ff"/>
            <line x1="12" y1="3" x2="12" y2="7" stroke="#00d4ff" strokeWidth="1.5"/>
          </svg>
        </div>
        <div style={{padding:"8px 0",flex:1,display:"flex",flexDirection:"column",gap:2,overflowY:"auto",alignItems:"center",width:"100%"}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setActive(n.id)} title={n.label} style={{
              display:"flex",alignItems:"center",justifyContent:"center",padding:"9px",borderRadius:7,width:38,
              color:active===n.id?"var(--cyan)":"var(--text2)",
              background:active===n.id?"rgba(0,212,255,0.08)":"transparent",
              border:`1px solid ${active===n.id?"rgba(0,212,255,0.2)":"transparent"}`,
              transition:"all .15s",position:"relative",
            }}>
              {n.icon}
              {n.id==="alerts"&&critCount>0&&<span style={{position:"absolute",top:5,right:5,width:5,height:5,borderRadius:"50%",background:"var(--red)"}}/>}
            </button>
          ))}
        </div>
        <div style={{padding:"8px 0",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"center",width:"100%"}}>
          {toggleBtn}
        </div>
      </div>
    );
  }

  return (
    <div style={{width:196,background:"var(--bg1)",borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",flexShrink:0}}>
      <div style={{height:52,display:"flex",alignItems:"center",gap:10,padding:"0 12px 0 16px",borderBottom:"1px solid var(--border)",flexShrink:0}}>
        <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <circle cx="12" cy="12" r="9" stroke="#00d4ff" strokeWidth="1.5"/>
          <circle cx="12" cy="12" r="5" stroke="#00d4ff" strokeWidth="1" strokeDasharray="2 2"/>
          <circle cx="12" cy="12" r="2" fill="#00d4ff"/>
          <line x1="12" y1="3" x2="12" y2="7" stroke="#00d4ff" strokeWidth="1.5"/>
          <line x1="21" y1="12" x2="17" y2="12" stroke="#00d4ff" strokeWidth="1.5"/>
        </svg>
        <div style={{flex:1}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--text0)",letterSpacing:"0.08em",fontFamily:"'JetBrains Mono',monospace"}}>NIDS</div>
          <div style={{fontSize:9,color:"var(--text2)",letterSpacing:"0.1em",textTransform:"uppercase"}}>Signature-based</div>
        </div>
        {toggleBtn}
      </div>

      <div style={{padding:"12px 8px",flex:1,display:"flex",flexDirection:"column",gap:2,overflowY:"auto"}}>
        <div style={{fontSize:9,color:"var(--text3)",letterSpacing:"0.12em",textTransform:"uppercase",padding:"4px 8px",marginBottom:3}}>Views</div>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setActive(n.id)} style={{
            display:"flex",alignItems:"center",gap:9,padding:"8px 10px",borderRadius:7,textAlign:"left",
            color:active===n.id?"var(--cyan)":"var(--text2)",
            background:active===n.id?"rgba(0,212,255,0.08)":"transparent",
            border:`1px solid ${active===n.id?"rgba(0,212,255,0.2)":"transparent"}`,
            transition:"all .15s",fontSize:12,fontWeight:active===n.id?600:400,
          }}>
            <span style={{flexShrink:0}}>{n.icon}</span>
            <span style={{flex:1}}>{n.label}</span>
            {n.id==="alerts"&&critCount>0&&<span style={{background:"var(--red)",color:"#fff",fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:10,fontFamily:"'JetBrains Mono',monospace"}}>{critCount}</span>}
            {n.id==="allowlist"&&allowlistCount>0&&<span style={{background:"rgba(0,223,160,0.15)",color:"var(--green)",fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:10,fontFamily:"'JetBrains Mono',monospace",border:"1px solid rgba(0,223,160,0.3)"}}>{allowlistCount}</span>}
          </button>
        ))}

        <div style={{marginTop:12,fontSize:9,color:"var(--text3)",letterSpacing:"0.12em",textTransform:"uppercase",padding:"4px 8px",marginBottom:3}}>System</div>
        {[
          {label:"Blocked IPs", val:blockedCount||"none", color:"var(--red)",   icon:<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" width="15" height="15"><circle cx="8" cy="8" r="6"/><line x1="4.5" y1="4.5" x2="11.5" y2="11.5"/></svg>},
          {label:`${ruleCount} Rules`, val:"active",      color:"var(--green)", icon:<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" width="15" height="15"><path d="M8 14s5-2.5 5-6.25V3L8 1.5 3 3v4.75C3 11.5 8 14 8 14z"/></svg>},
          {label:"Interface",    val:iface,               color:"var(--cyan)",  icon:<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" width="15" height="15"><rect x="2" y="4" width="12" height="2.5" rx="1"/><rect x="2" y="8" width="9" height="2.5" rx="1"/><rect x="2" y="12" width="6" height="2.5" rx="1"/></svg>},
        ].map(item=>(
          <div key={item.label} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 10px",borderRadius:7,color:"var(--text2)",fontSize:11}}>
            <span style={{color:item.color,opacity:0.8,flexShrink:0}}>{item.icon}</span>
            <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.label}</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:item.color,fontWeight:600,flexShrink:0}}>{item.val}</span>
          </div>
        ))}
      </div>

      {apiMode && (
        <CapturePanel
          captureStatus={captureStatus}
          onCaptureStart={onCaptureStart}
          onCaptureStop={onCaptureStop}
        />
      )}

      <div style={{padding:"10px 14px",borderTop:"1px solid var(--border)"}}>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
          <LiveDot color={apiMode?"var(--green)":"var(--amber)"} size={7}/>
          <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,color:apiMode?"var(--green)":"var(--amber)"}}>{apiMode?"LIVE MODE":"DEMO MODE"}</span>
        </div>
        <div style={{fontSize:9,color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace",lineHeight:1.6}}>
          {apiMode?"Engine connected · real alerts":"Simulated data · start capture to go live"}
        </div>
      </div>
    </div>
  );
}

// ─── HEADER ───────────────────────────────────────────────────────────────────
function Header({ active, paused, onExport, onShortcuts, onTweaks, onTheme, theme, apiMode }) {
  const [clock,setClock]=useState(new Date());
  useEffect(()=>{const iv=setInterval(()=>setClock(new Date()),1000);return()=>clearInterval(iv);},[]);
  const titles={dashboard:"Overview",alerts:"Alert Feed",map:"Attack Map",rules:"Rule Coverage",analytics:"Analytics",allowlist:"IP / Subnet Allowlist"};
  return (
    <div style={{height:52,background:"var(--bg2)",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",padding:"0 20px",gap:14,flexShrink:0}}>
      <h1 style={{fontSize:15,fontWeight:700,color:"var(--text0)",flex:1}}>{titles[active]||"Dashboard"}</h1>

      <div style={{display:"flex",gap:14}}>
        {Object.entries(NIDS_SEV).map(([k,v])=>(
          <div key={k} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:"var(--text2)"}}>
            <span style={{width:6,height:6,borderRadius:1,background:v.color,display:"inline-block"}}/>
            {k}
          </div>
        ))}
      </div>

      <div style={{width:1,height:18,background:"var(--border-md)"}}/>

      <button onClick={onExport} title="Export CSV (E)" style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:6,background:"var(--bg4)",border:"1px solid var(--border-md)",color:"var(--text1)",fontSize:11,fontWeight:500}}>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" width="13" height="13"><path d="M8 2v8M5 7l3 3 3-3"/><path d="M3 11v2h10v-2"/></svg>
        Export
      </button>
      <button onClick={onShortcuts} title="Shortcuts (?)" style={{display:"flex",alignItems:"center",justifyContent:"center",width:30,height:30,borderRadius:6,background:"var(--bg4)",border:"1px solid var(--border-md)",color:"var(--text1)",fontSize:12,fontWeight:600}}>?</button>
      <button onClick={onTheme} title="Toggle light/dark mode (T)" style={{display:"flex",alignItems:"center",justifyContent:"center",width:30,height:30,borderRadius:6,background:"var(--bg4)",border:"1px solid var(--border-md)",color:"var(--text1)"}}>
        {theme==="light"
          ? <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" width="14" height="14"><circle cx="8" cy="8" r="3"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"/></svg>
          : <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" width="14" height="14"><path d="M13.5 10.5A6 6 0 015.5 2.5a6 6 0 108 8z"/></svg>
        }
      </button>
      <button onClick={onTweaks} title="Settings" style={{display:"flex",alignItems:"center",justifyContent:"center",width:30,height:30,borderRadius:6,background:"var(--bg4)",border:"1px solid var(--border-md)",color:"var(--text1)"}}>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" width="14" height="14"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg>
      </button>

      <div style={{width:1,height:18,background:"var(--border-md)"}}/>

      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <LiveDot color={paused?"var(--amber)":"var(--green)"} size={7} animate={!paused}/>
        <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,color:paused?"var(--amber)":"var(--green)",letterSpacing:"0.1em"}}>{paused?"PAUSED":"LIVE"}</span>
      </div>

      <div style={{width:1,height:18,background:"var(--border-md)"}}/>
      <div style={{fontFamily:"'JetBrains Mono',monospace",textAlign:"right",lineHeight:1.5}}>
        <div style={{fontSize:11,color:"var(--text1)"}}>{clock.toLocaleTimeString("en-US",{hour12:false})}</div>
        <div style={{fontSize:9,color:"var(--text3)"}}>{clock.toLocaleDateString("en-US",{dateStyle:"medium"})}</div>
      </div>
    </div>
  );
}

// ─── STATUS BAR ───────────────────────────────────────────────────────────────
function StatusBar({ queuePct, dropRate, uptime, pktRate, health, apiMode, captureStatus }) {
  const iface = health?.interface || "—";
  const logSize = health?.log_size || "—";
  const capRunning = captureStatus?.running ?? false;
  const items=[
    {l:"ENGINE",    v:capRunning?"RUNNING":"STOPPED", ok:capRunning, title:"Detection engine status"},
    {l:"INTERFACE", v:iface,            ok:true,               title:"Capture network interface"},
    {l:"QUEUE",     v:`${queuePct}%`,   ok:queuePct<80, warn:queuePct>=50, title:"Packet queue fill level"},
    {l:"DROP RATE", v:`${dropRate}%`,   ok:parseFloat(dropRate)<1, title:"Estimated packet drop rate"},
    {l:"UPTIME",    v:uptime,           ok:true,               title:"Dashboard session uptime"},
    {l:"PKT/S",     v:pktRate,          ok:pktRate<400,        title:"Current packets per second"},
    {l:"LOG",       v:logSize,          ok:health?.log_exists!==false, title:"Alert log file size"},
    {l:"MODE",      v:apiMode?"LIVE":"DEMO", ok:apiMode,        title:apiMode?"Connected to real engine":"Simulated demo data — start capture for live alerts"},
  ];
  return (
    <div style={{height:30,background:"var(--bg1)",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",padding:"0 20px",gap:0,overflowX:"auto",flexShrink:0}}>
      {items.map((item,i)=>(
        <React.Fragment key={item.l}>
          {i>0&&<div style={{width:1,height:13,background:"var(--border-md)",margin:"0 13px"}}/>}
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            <span title={item.title} style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:"var(--text3)",letterSpacing:"0.1em",cursor:"help"}}>{item.l}</span>
            <span title={item.title} style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,color:!item.ok?"var(--red)":item.warn?"var(--amber)":"var(--text1)",cursor:"help"}}>{item.v}</span>
          </div>
        </React.Fragment>
      ))}
      <div style={{flex:1}}/>
      <div style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:"var(--text3)"}}>Python · Scapy · Flask</div>
    </div>
  );
}

// ─── THREAT POSTURE ───────────────────────────────────────────────────────────
function ThreatPosture({ alerts }) {
  const recent=alerts.filter(a=>Date.now()-new Date(a.timestamp)<3600000);
  const crit=recent.filter(a=>a.severity==="CRITICAL").length;
  const high=recent.filter(a=>a.severity==="HIGH").length;
  const level=crit>5?"CRITICAL":crit>0?"HIGH":high>10?"HIGH":high>3?"ELEVATED":"NORMAL";
  const cfg={
    CRITICAL:{color:"var(--red)",    desc:"Active critical threats — immediate response required"},
    HIGH:    {color:"var(--orange)", desc:"High-severity events in the last hour"},
    ELEVATED:{color:"var(--amber)",  desc:"Elevated activity — monitoring closely"},
    NORMAL:  {color:"var(--green)",  desc:"No critical threats detected"},
  }[level];
  return (
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"9px 16px",background:`${cfg.color}08`,border:`1px solid ${cfg.color}30`,borderRadius:8}}>
      <LiveDot color={cfg.color} size={9} animate={level!=="NORMAL"}/>
      <div style={{flex:1}}>
        <span style={{fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:cfg.color,letterSpacing:"0.08em"}}>THREAT LEVEL: {level}</span>
        <span style={{fontSize:10,color:"var(--text2)",marginLeft:10}}>{cfg.desc} · {recent.length} events/hr</span>
      </div>
      {[["CRIT",crit,"var(--red)"],["HIGH",high,"var(--orange)"],["MED",recent.filter(a=>a.severity==="MEDIUM").length,"var(--amber)"]].map(([l,v,c])=>(
        <div key={l} style={{textAlign:"center",minWidth:36}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:700,color:v>0?c:"var(--text3)",lineHeight:1}}>{v}</div>
          <div style={{fontSize:9,color:"var(--text3)",marginTop:1}}>{l}</div>
        </div>
      ))}
    </div>
  );
}

// ─── TOP ATTACKERS ────────────────────────────────────────────────────────────
function TopAttackers({ alerts, onInvestigate }) {
  const top=useMemo(()=>{
    const m={};
    alerts.forEach(a=>{
      if(!m[a.src_ip])m[a.src_ip]={ip:a.src_ip,count:0,crit:0,country:a.src_country||"?"};
      m[a.src_ip].count++;
      if(a.severity==="CRITICAL")m[a.src_ip].crit++;
    });
    return Object.values(m).sort((a,b)=>b.count-a.count).slice(0,6);
  },[alerts]);
  const max=top[0]?.count||1;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:7}}>
      {top.map((item,i)=>(
        <div key={item.ip} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}} onClick={()=>onInvestigate&&onInvestigate(item.ip)}>
          <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:"var(--text3)",width:13,textAlign:"right",flexShrink:0}}>{i+1}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"var(--cyan)",fontWeight:500,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.ip}</span>
              <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                {item.crit>0&&<span style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:"var(--red)",background:"rgba(255,51,85,0.1)",padding:"1px 4px",borderRadius:3,border:"1px solid rgba(255,51,85,0.25)"}}>{item.crit}×CRIT</span>}
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:600,color:"var(--text1)"}}>{item.count}</span>
              </div>
            </div>
            <div style={{height:3,background:"var(--bg5)",borderRadius:2}}>
              <div style={{height:3,background:"linear-gradient(90deg,#00a8cc,#00d4ff)",borderRadius:2,width:`${(item.count/max)*100}%`,opacity:0.7,transition:"width .4s"}}/>
            </div>
            <div style={{fontSize:9,color:"var(--text3)",marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>{item.country}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── ALERT TABLE ──────────────────────────────────────────────────────────────
function AlertTable({ alerts, paused, setPaused, filter, setFilter, newIds, maxRows, blockedIPs, onBlock, onInvestigate, ruleSearchRef }) {
  const filtered=useMemo(()=>alerts.filter(a=>{
    if(filter.sev&&a.severity!==filter.sev)return false;
    if(filter.cat&&a.category!==filter.cat)return false;
    if(filter.ip&&!a.src_ip.includes(filter.ip)&&!a.dst_ip.includes(filter.ip))return false;
    if(filter.rule&&!a.rule.toLowerCase().includes(filter.rule.toLowerCase()))return false;
    return true;
  }),[alerts,filter]);

  const cats=useMemo(()=>[...new Set(alerts.map(a=>a.category).filter(Boolean))].sort(),[alerts]);

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{display:"flex",gap:8,padding:"9px 14px",borderBottom:"1px solid var(--border)",alignItems:"center",flexShrink:0,background:"var(--bg3)",flexWrap:"wrap"}}>
        <select value={filter.sev} onChange={e=>setFilter(f=>({...f,sev:e.target.value}))} style={{fontSize:11,height:28,padding:"0 8px"}}>
          <option value="">All Severities</option>
          {["CRITICAL","HIGH","MEDIUM","LOW"].map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <select value={filter.cat} onChange={e=>setFilter(f=>({...f,cat:e.target.value}))} style={{fontSize:11,height:28,padding:"0 8px"}}>
          <option value="">All Categories</option>
          {cats.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <input ref={ruleSearchRef} placeholder="Rule…" value={filter.rule} onChange={e=>setFilter(f=>({...f,rule:e.target.value}))} style={{fontSize:11,height:28,width:140}}/>
        <input placeholder="IP address…" value={filter.ip} onChange={e=>setFilter(f=>({...f,ip:e.target.value}))} style={{fontSize:11,height:28,width:130,fontFamily:"'JetBrains Mono',monospace"}}/>
        <button onClick={()=>setFilter({sev:"",cat:"",ip:"",rule:""})} style={{fontSize:10,color:"var(--text2)",padding:"0 8px",height:28,borderRadius:6,border:"1px solid var(--border-md)",background:"var(--bg4)"}}>Clear (C)</button>
        <div style={{flex:1}}/>
        <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:"var(--text2)"}}>{filtered.length.toLocaleString()} events</span>
        <button onClick={()=>nidsExportCSV(filtered)} style={{display:"flex",alignItems:"center",gap:4,padding:"0 10px",height:28,borderRadius:6,fontSize:11,background:"var(--bg4)",border:"1px solid var(--border-md)",color:"var(--text1)"}}>
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5" width="11" height="11"><path d="M7 2v6M5 6l2 2 2-2"/><path d="M2 10v2h10v-2"/></svg>CSV
        </button>
        <button onClick={()=>setPaused(p=>!p)} style={{display:"flex",alignItems:"center",gap:5,padding:"0 12px",height:28,borderRadius:6,fontSize:11,fontWeight:600,background:paused?"rgba(255,190,46,0.1)":"rgba(0,223,160,0.1)",border:`1px solid ${paused?"rgba(255,190,46,0.35)":"rgba(0,223,160,0.35)"}`,color:paused?"var(--amber)":"var(--green)"}}>
          {paused?<><svg viewBox="0 0 12 12" fill="currentColor" width="9" height="9"><polygon points="2,1 11,6 2,11"/></svg>RESUME</>:<><svg viewBox="0 0 12 12" fill="currentColor" width="9" height="9"><rect x="1" y="1" width="4" height="10"/><rect x="7" y="1" width="4" height="10"/></svg>PAUSE</>}
        </button>
      </div>
      <div style={{overflowY:"auto",flex:1}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead>
            <tr style={{position:"sticky",top:0,background:"var(--bg2)",zIndex:2}}>
              {["TIME","SEV","RULE / CATEGORY","SRC IP","DST IP","PORT","PROTO","COUNT",""].map((h,i)=>(
                <th key={i} style={{padding:`7px ${i===0?"14px":"8px"}`,textAlign:"left",fontSize:9,fontWeight:600,color:"var(--text3)",letterSpacing:"0.1em",textTransform:"uppercase",borderBottom:"1px solid var(--border)",whiteSpace:"nowrap"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.slice(0,maxRows).map(a=>(
              <AlertRow key={a.id} alert={a} isNew={newIds.has(a.id)} blockedIPs={blockedIPs} onBlock={onBlock} onInvestigate={onInvestigate}/>
            ))}
            {filtered.length===0&&(
              <tr><td colSpan={9} style={{textAlign:"center",padding:"48px",color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>No alerts match filters</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

            <svg viewBox="0 0 16 16" fill="none" stroke="#ffbe2e" strokeWidth="1.5" width="14" height="14"><circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8.5"/><circle cx="8" cy="10.5" r=".6" fill="#ffbe2e"/></svg>
            <span style={{fontSize:11,color:"var(--amber)",fontWeight:600}}>Demo Mode</span>

// ─── ALLOWLIST VIEW ───────────────────────────────────────────────────────────
function AllowlistView({ entries, onRefresh, apiMode }) {
  const [input,   setInput]   = useState("");
  const [error,   setError]   = useState("");
  const [busy,    setBusy]    = useState(false);

  const handleAdd = useCallback(async () => {
    const val = input.trim();
    if (!val) return;
    setBusy(true); setError("");
    const ok = await nidsAddAllowlistEntry(val);
    if (ok) { setInput(""); await onRefresh(); }
    else setError("Invalid entry — use an IP (1.2.3.4) or CIDR subnet (10.0.0.0/8)");
    setBusy(false);
  }, [input, onRefresh]);

  const handleRemove = useCallback(async (entry) => {
    await nidsRemoveAllowlistEntry(entry);
    onRefresh();
  }, [onRefresh]);

  const btnStyle = (disabled) => ({
    padding:"0 16px", height:34, borderRadius:7, fontSize:12, fontWeight:600,
    background: disabled ? "var(--bg5)" : "rgba(0,223,160,0.15)",
    border: `1px solid ${disabled ? "var(--border-md)" : "rgba(0,223,160,0.35)"}`,
    color: disabled ? "var(--text3)" : "var(--green)",
    cursor: disabled ? "not-allowed" : "pointer", transition:"all .15s",
    fontFamily:"'Inter',sans-serif",
  });

  return (
    <div style={{padding:20,height:"100%",overflowY:"auto"}}>
      <div style={{marginBottom:20}}>
        <h2 style={{fontSize:15,fontWeight:700,color:"var(--text0)"}}>IP / Subnet Allowlist</h2>
        <p style={{fontSize:11,color:"var(--text2)",marginTop:5,lineHeight:1.7}}>
          Allowlisted addresses are silently skipped by the detection engine — no alerts will fire for traffic originating from them.
          Supports individual hosts (<span style={{fontFamily:"'JetBrains Mono',monospace"}}>192.168.1.5</span>) and CIDR subnets (<span style={{fontFamily:"'JetBrains Mono',monospace"}}>10.0.0.0/8</span>).
        </p>
      </div>

      {/* Add form */}
      <div style={{background:"var(--bg3)",border:"1px solid var(--border-md)",borderRadius:10,padding:"16px 18px",marginBottom:22,maxWidth:580}}>
        <div style={{fontSize:11,fontWeight:600,color:"var(--text1)",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:10}}>Add Entry</div>
        <div style={{display:"flex",gap:8}}>
          <input
            placeholder="e.g.  192.168.1.0/24  or  10.0.0.5"
            value={input}
            onChange={e=>{setInput(e.target.value);setError("");}}
            onKeyDown={e=>e.key==="Enter"&&!busy&&apiMode&&handleAdd()}
            disabled={!apiMode||busy}
            style={{flex:1,fontFamily:"'JetBrains Mono',monospace",fontSize:12,height:34}}
          />
          <button onClick={handleAdd} disabled={busy||!apiMode||!input.trim()} style={btnStyle(busy||!apiMode||!input.trim())}>
            {busy?"Adding…":"Add"}
          </button>
        </div>
        {error&&(
          <div style={{marginTop:8,fontSize:11,color:"var(--red)",display:"flex",alignItems:"center",gap:6}}>
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5" width="12" height="12"><circle cx="7" cy="7" r="5"/><line x1="7" y1="4.5" x2="7" y2="7"/><circle cx="7" cy="9.5" r=".6" fill="currentColor"/></svg>
            {error}
          </div>
        )}
        {!apiMode&&(
          <div style={{marginTop:8,fontSize:10,color:"var(--amber)",fontFamily:"'JetBrains Mono',monospace"}}>
            Backend not connected — connect the engine to manage allowlist entries.
          </div>
        )}
      </div>

      {/* Entries table */}
      <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:10,overflow:"hidden",maxWidth:740}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",borderBottom:"1px solid var(--border)",background:"var(--bg2)"}}>
          <span style={{fontSize:10,fontWeight:600,color:"var(--text2)",letterSpacing:"0.12em",textTransform:"uppercase"}}>Allowlisted Entries</span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,color:entries.length>0?"var(--green)":"var(--text3)"}}>{entries.length} {entries.length===1?"entry":"entries"}</span>
        </div>

        {entries.length===0?(
          <div style={{textAlign:"center",padding:"40px 20px",color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" width="32" height="32" style={{display:"block",margin:"0 auto 12px",opacity:0.35}}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="8 12 11 15 16 9"/></svg>
            No entries — all source IPs are subject to detection
          </div>
        ):(
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:"var(--bg2)"}}>
                {["Entry","Type","Action"].map((h,i)=>(
                  <th key={h} style={{padding:"7px 16px",textAlign:i===2?"right":"left",fontSize:9,fontWeight:600,color:"var(--text3)",letterSpacing:"0.1em",textTransform:"uppercase",borderBottom:"1px solid var(--border)",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {entries.map((entry,idx)=>{
                const isSubnet = entry.includes("/");
                const prefix   = isSubnet ? entry.split("/")[1] : null;
                const typeLabel= isSubnet ? `Subnet /${prefix}` : "Host";
                const typeColor= isSubnet ? "var(--purple)" : "var(--cyan)";
                return (
                  <tr key={entry} style={{borderTop:idx>0?"1px solid var(--border)":"none"}}>
                    <td style={{padding:"10px 16px",fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"var(--text0)",fontWeight:500}}>{entry}</td>
                    <td style={{padding:"10px 16px"}}>
                      <span style={{fontSize:10,fontWeight:600,color:typeColor,background:`${typeColor}15`,border:`1px solid ${typeColor}30`,padding:"2px 8px",borderRadius:5,fontFamily:"'JetBrains Mono',monospace"}}>{typeLabel}</span>
                    </td>
                    <td style={{padding:"10px 16px",textAlign:"right"}}>
                      {apiMode&&(
                        <button onClick={()=>handleRemove(entry)} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:6,fontSize:11,background:"rgba(255,51,85,0.08)",border:"1px solid rgba(255,51,85,0.2)",color:"var(--red)",cursor:"pointer",fontFamily:"'Inter',sans-serif"}}>
                          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5" width="10" height="10"><polyline points="1 3 13 3"/><path d="M4 3V2h6v1M5 6v5M9 6v5"/><path d="M2 3l1 9h8l1-9"/></svg>
                          Remove
                        </button>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>

      {entries.length>0&&(
        <p style={{marginTop:10,fontSize:10,color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace"}}>
          Changes take effect within ~2 minutes in the running detection engine.
        </p>
      )}
    </div>
  );
}

const PCAP_SEV_COLORS = {CRITICAL:'#ff3355',HIGH:'#ff7c2a',MEDIUM:'#ffbe2e',LOW:'#4a8fff'};
const PCAP_SEV_ORDER  = ['CRITICAL','HIGH','MEDIUM','LOW'];
const PCAP_SEV_RANK   = {LOW:0,MEDIUM:1,HIGH:2,CRITICAL:3};

function useChartJs(canvasRef, buildConfig) {
  useEffect(() => {
    if (!canvasRef.current) return;
    const cfg = buildConfig();
    if (!cfg) return;
    try { Chart.getChart(canvasRef.current)?.destroy(); } catch(e) {}
    let chart;
    try { chart = new Chart(canvasRef.current, cfg); } catch(e) {}
    return () => { try { chart?.destroy(); } catch(e) {} };
  }, []); // eslint-disable-line react-hooks/exhaustive-deps
}

function PcapSevBadge({ sev }) {
  const bg   = {CRITICAL:'rgba(255,51,85,0.15)',HIGH:'rgba(255,124,42,0.15)',MEDIUM:'rgba(255,190,46,0.15)',LOW:'rgba(74,143,255,0.15)'};
  const clr  = {CRITICAL:'var(--red)',HIGH:'var(--orange)',MEDIUM:'var(--amber)',LOW:'var(--blue)'};
  return <span style={{display:'inline-flex',alignItems:'center',padding:'2px 7px',borderRadius:4,
    fontSize:10,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",letterSpacing:'.04em',
    background:bg[sev]||bg.LOW,color:clr[sev]||clr.LOW}}>{sev}</span>;
}

function PcapUploadScreen({ onFile }) {
  const [dragging, setDragging] = useState(false);
  const fileRef = useRef(null);
  const pick = (file) => {
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['pcap','pcapng','cap'].includes(ext)) { alert('Select a .pcap, .pcapng, or .cap file.'); return; }
    onFile(file);
  };
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      height:'100%',padding:40,gap:24,overflowY:'auto'}}>
      <div style={{textAlign:'center',maxWidth:520}}>
        <div style={{fontSize:20,fontWeight:700,color:'var(--text0)',marginBottom:8,
          fontFamily:"'JetBrains Mono',monospace",letterSpacing:'.03em'}}>PCAP Analysis</div>
        <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.6}}>
          Drop a packet capture to run it through 70+ NIDS signatures — port scans, brute force, C2, exfiltration and more.
        </div>
      </div>
      <div onClick={()=>fileRef.current?.click()}
        onDragOver={e=>{e.preventDefault();setDragging(true);}}
        onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setDragging(false);}}
        onDrop={e=>{e.preventDefault();setDragging(false);pick(e.dataTransfer.files[0]);}}
        style={{width:'100%',maxWidth:520,background:dragging?'rgba(0,212,255,0.04)':'var(--bg3)',
          border:`2px dashed ${dragging?'var(--cyan)':'var(--border-md)'}`,
          borderRadius:14,padding:'48px 32px',display:'flex',flexDirection:'column',
          alignItems:'center',gap:16,cursor:'pointer',transition:'border-color .2s,background .2s',textAlign:'center'}}>
        <div style={{width:56,height:56,borderRadius:14,background:'rgba(0,212,255,0.08)',
          border:'1px solid rgba(0,212,255,0.2)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg viewBox="0 0 24 24" fill="none" stroke="#00d4ff" strokeWidth="1.5" width="28" height="28">
            <path d="M12 16V4M8 8l4-4 4 4"/><path d="M4 16v3a1 1 0 001 1h14a1 1 0 001-1v-3"/>
          </svg>
        </div>
        <div style={{fontSize:15,fontWeight:600,color:'var(--text0)'}}>Drop your capture file here</div>
        <div style={{fontSize:12,color:'var(--text2)'}}>or click anywhere to browse</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center'}}>
          {['.pcap','.pcapng','.cap'].map(ext=>(
            <span key={ext} style={{padding:'3px 10px',borderRadius:20,fontSize:10,fontWeight:700,
              fontFamily:"'JetBrains Mono',monospace",letterSpacing:'.06em',
              background:'var(--bg4)',border:'1px solid var(--border-md)',color:'var(--text2)'}}>{ext}</span>
          ))}
        </div>
        <input ref={fileRef} type="file" accept=".pcap,.pcapng,.cap" style={{display:'none'}}
          onChange={e=>pick(e.target.files?.[0])}/>
      </div>
      <div style={{fontSize:11,color:'var(--text3)',textAlign:'center'}}>
        Max 500 MB · No data leaves your machine · Analysis runs locally
      </div>
    </div>
  );
}

function PcapOverviewTab({ data }) {
  const { meta, by_severity:bySev, by_category, top_rules, top_ips } = data;
  const total = meta.total_alerts;
  const sevLabels = PCAP_SEV_ORDER.filter(s=>bySev[s]>0);
  const catEntries = Object.entries(by_category).slice(0,10);
  const rules = top_rules.slice(0,12);

  let vBg,vBorder,vColor,vText;
  if(bySev.CRITICAL>0){vBg='rgba(255,51,85,0.07)';vBorder='rgba(255,51,85,0.3)';vColor='var(--red)';vText=`CRITICAL THREATS — ${bySev.CRITICAL} critical, ${bySev.HIGH} high alerts`;}
  else if(bySev.HIGH>0){vBg='rgba(255,124,42,0.07)';vBorder='rgba(255,124,42,0.3)';vColor='var(--orange)';vText=`HIGH-SEVERITY THREATS — ${bySev.HIGH} high alerts`;}
  else if(bySev.MEDIUM>0){vBg='rgba(255,190,46,0.07)';vBorder='rgba(255,190,46,0.3)';vColor='var(--amber)';vText=`MEDIUM ACTIVITY — ${bySev.MEDIUM} alerts`;}
  else if(total>0){vBg='rgba(74,143,255,0.07)';vBorder='rgba(74,143,255,0.3)';vColor='var(--blue)';vText=`LOW ACTIVITY — ${bySev.LOW} alerts`;}
  else{vBg='rgba(0,223,160,0.07)';vBorder='rgba(0,223,160,0.3)';vColor='var(--green)';vText='NO THREATS DETECTED';}

  const CHART_TOOLTIP = {backgroundColor:'rgba(9,12,22,0.95)',borderColor:'rgba(255,255,255,0.1)',
    borderWidth:1,titleColor:'#eef2f8',bodyColor:'#8fa3be',padding:10,cornerRadius:8};

  const sevRef=useRef(null), catRef=useRef(null), rulesRef=useRef(null);

  useChartJs(sevRef, ()=>!sevLabels.length?null:({
    type:'doughnut',
    data:{labels:sevLabels,datasets:[{data:sevLabels.map(s=>bySev[s]),
      backgroundColor:sevLabels.map(s=>PCAP_SEV_COLORS[s]),borderColor:'#090c16',borderWidth:3,hoverOffset:8}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#8fa3be',font:{size:11}},position:'right'},tooltip:CHART_TOOLTIP},cutout:'62%'}
  }));
  useChartJs(catRef, ()=>!catEntries.length?null:({
    type:'bar',
    data:{labels:catEntries.map(c=>c[0]),datasets:[{data:catEntries.map(c=>c[1]),
      backgroundColor:catEntries.map((_,i)=>`hsla(${200+i*18},70%,60%,0.7)`),
      borderColor:catEntries.map((_,i)=>`hsla(${200+i*18},70%,60%,1)`),borderWidth:1,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
      plugins:{legend:{display:false},tooltip:CHART_TOOLTIP},
      scales:{x:{ticks:{color:'#4e6278',maxTicksLimit:6},grid:{color:'rgba(255,255,255,0.04)'},border:{display:false}},
              y:{ticks:{color:'#8fa3be',font:{size:11}},grid:{display:false},border:{display:false}}}}
  }));
  useChartJs(rulesRef, ()=>!rules.length?null:({
    type:'bar',
    data:{labels:rules.map(r=>r.rule),datasets:[{data:rules.map(r=>r.count),
      backgroundColor:rules.map(r=>PCAP_SEV_COLORS[r.severity]+'99'),
      borderColor:rules.map(r=>PCAP_SEV_COLORS[r.severity]),borderWidth:1,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
      plugins:{legend:{display:false},tooltip:CHART_TOOLTIP},
      scales:{x:{ticks:{color:'#4e6278',maxTicksLimit:6},grid:{color:'rgba(255,255,255,0.04)'},border:{display:false}},
              y:{ticks:{color:'#8fa3be',font:{size:11}},grid:{display:false},border:{display:false}}}}
  }));

  return (
    <div style={{padding:16,display:'flex',flexDirection:'column',gap:14,overflowY:'auto',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 18px',borderRadius:10,
        border:'1px solid',borderColor:vBorder,background:vBg,color:vColor,fontSize:13,fontWeight:600,flexWrap:'wrap'}}>
        {vText}
        <span style={{fontSize:11,fontWeight:400,color:'var(--text1)',marginLeft:8}}>
          · {total} alerts · {top_ips.length} attackers · {meta.pcap_file}
        </span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:10}}>
        {[{l:'Total',v:total.toLocaleString(),sub:`${top_ips.length} attackers`},
          {l:'Critical',v:bySev.CRITICAL,c:'var(--red)',   sub:`${total?(bySev.CRITICAL/total*100).toFixed(1):0}%`},
          {l:'High',    v:bySev.HIGH,    c:'var(--orange)',sub:`${total?(bySev.HIGH/total*100).toFixed(1):0}%`},
          {l:'Medium',  v:bySev.MEDIUM,  c:'var(--amber)', sub:`${total?(bySev.MEDIUM/total*100).toFixed(1):0}%`},
          {l:'Low',     v:bySev.LOW,     c:'var(--blue)',  sub:`${total?(bySev.LOW/total*100).toFixed(1):0}%`},
        ].map(c=>(
          <div key={c.l} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'14px 16px'}}>
            <div style={{fontSize:9,fontWeight:600,color:'var(--text2)',letterSpacing:'.12em',textTransform:'uppercase'}}>{c.l}</div>
            <div style={{fontSize:22,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:c.c||'var(--text0)',lineHeight:1,marginTop:4}}>{c.v}</div>
            <div style={{fontSize:10,color:'var(--text2)',marginTop:4}}>{c.sub}</div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'260px 1fr',gap:14}}>
        <PcapBox title="Severity Distribution"><div style={{position:'relative',height:200}}><canvas ref={sevRef}/></div></PcapBox>
        <PcapBox title="Alert Categories"><div style={{position:'relative',height:200}}><canvas ref={catRef}/></div></PcapBox>
      </div>
      <PcapBox title="Top Rules Triggered">
        <div style={{position:'relative',height:Math.max(120,rules.length*24)}}><canvas ref={rulesRef}/></div>
      </PcapBox>
    </div>
  );
}

function PcapAlertsTab({ alerts, onInvestigate }) {
  const [filter,setFilter] = useState({sev:'',ip:'',rule:''});
  const [sort,setSort]     = useState({col:'timestamp',dir:-1});
  const [page,setPage]     = useState(0);
  const PAGE = 50;

  const filtered = useMemo(()=>{
    let rows = alerts.filter(a=>{
      if(filter.sev  && a.severity!==filter.sev) return false;
      if(filter.ip   && !(a.src_ip||'').toLowerCase().includes(filter.ip.toLowerCase())) return false;
      if(filter.rule && !(a.rule||'').toLowerCase().includes(filter.rule.toLowerCase())) return false;
      return true;
    });
    rows.sort((a,b)=>{
      let av=a[sort.col]??'',bv=b[sort.col]??'';
      if(sort.col==='severity'){av=PCAP_SEV_ORDER.indexOf(av);bv=PCAP_SEV_ORDER.indexOf(bv);}
      if(sort.col==='threat_score'||sort.col==='dst_port'){av=av||0;bv=bv||0;}
      return av<bv?sort.dir:av>bv?-sort.dir:0;
    });
    return rows;
  },[alerts,filter,sort]);

  const pages = Math.max(1,Math.ceil(filtered.length/PAGE));
  const pg    = Math.min(page,pages-1);
  const slice = filtered.slice(pg*PAGE,(pg+1)*PAGE);

  const TH = ({col,label})=>(
    <th onClick={()=>{setSort(s=>s.col===col?{...s,dir:-s.dir}:{col,dir:-1});setPage(0);}}
      style={{padding:'8px 12px',textAlign:'left',fontSize:10,fontWeight:600,
        color:sort.col===col?'var(--cyan)':'var(--text2)',letterSpacing:'.08em',textTransform:'uppercase',
        borderBottom:'1px solid var(--border)',background:'var(--bg2)',whiteSpace:'nowrap',
        cursor:'pointer',userSelect:'none'}}>
      {label}{sort.col===col?(sort.dir>0?' ↑':' ↓'):''}
    </th>
  );

  const td = {padding:'8px 12px',borderBottom:'1px solid var(--border)',fontSize:12,color:'var(--text1)',verticalAlign:'middle'};

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'9px 14px',
        borderBottom:'1px solid var(--border)',background:'var(--bg2)',flexWrap:'wrap',flexShrink:0}}>
        <select value={filter.sev} onChange={e=>{setFilter(f=>({...f,sev:e.target.value}));setPage(0);}}
          style={{fontSize:11,height:28,padding:'0 8px'}}>
          <option value="">All severities</option>
          {PCAP_SEV_ORDER.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <input placeholder="Filter IP…" value={filter.ip}
          onChange={e=>{setFilter(f=>({...f,ip:e.target.value}));setPage(0);}}
          style={{fontSize:11,height:28,width:130,fontFamily:"'JetBrains Mono',monospace"}}/>
        <input placeholder="Filter rule…" value={filter.rule}
          onChange={e=>{setFilter(f=>({...f,rule:e.target.value}));setPage(0);}}
          style={{fontSize:11,height:28,width:160}}/>
        <button onClick={()=>{setFilter({sev:'',ip:'',rule:''});setPage(0);}}
          style={{fontSize:10,color:'var(--text2)',padding:'0 8px',height:28,borderRadius:6,
            border:'1px solid var(--border-md)',background:'var(--bg4)',cursor:'pointer'}}>Clear</button>
        <div style={{flex:1}}/>
        <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:'var(--text2)'}}>
          {filtered.length.toLocaleString()} alerts
        </span>
      </div>
      <div style={{flex:1,overflowY:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr>
              <TH col="timestamp"    label="Timestamp"/>
              <TH col="severity"     label="Severity"/>
              <TH col="rule"         label="Rule"/>
              <TH col="src_ip"       label="Source IP"/>
              <TH col="dst_ip"       label="Dest IP"/>
              <TH col="dst_port"     label="Port"/>
              <TH col="threat_score" label="Threat"/>
            </tr>
          </thead>
          <tbody>
            {slice.length ? slice.map((a,i)=>(
              <tr key={i} style={{transition:'background .1s'}}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.025)'}
                onMouseLeave={e=>e.currentTarget.style.background=''}>
                <td style={{...td,fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:'var(--text2)'}}>
                  {(a.timestamp||'').replace('T',' ').substring(0,19)}
                </td>
                <td style={td}><PcapSevBadge sev={a.severity}/></td>
                <td style={{...td,maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',
                  whiteSpace:'nowrap',fontWeight:500}} title={a.rule}>{a.rule}</td>
                <td style={{...td,fontFamily:"'JetBrains Mono',monospace",fontSize:11,
                  color:'var(--cyan)',cursor:'pointer'}} onClick={()=>onInvestigate(a.src_ip)}>
                  {a.src_ip}
                </td>
                <td style={{...td,fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:'var(--text2)'}}>{a.dst_ip}</td>
                <td style={{...td,fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:'var(--text2)'}}>{a.dst_port||'—'}</td>
                <td style={{...td,fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,
                  color:(a.threat_score||0)>=80?'var(--red)':(a.threat_score||0)>=50?'var(--orange)':(a.threat_score||0)>=30?'var(--amber)':'var(--text3)'}}>
                  {a.threat_score||'—'}
                </td>
              </tr>
            )) : (
              <tr><td colSpan={7} style={{padding:40,textAlign:'center',color:'var(--text3)',fontSize:12}}>
                No alerts match filters
              </td></tr>
            )}
          </tbody>
        </table>
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
        padding:'10px 16px',borderTop:'1px solid var(--border)',background:'var(--bg2)',flexShrink:0}}>
        <span style={{fontSize:10,color:'var(--text3)',fontFamily:"'JetBrains Mono',monospace"}}>
          {pg*PAGE+1}–{Math.min((pg+1)*PAGE,filtered.length)} of {filtered.length}
        </span>
        <div style={{display:'flex',gap:4}}>
          <button disabled={pg===0} onClick={()=>setPage(p=>p-1)}
            style={{padding:'4px 9px',borderRadius:5,fontSize:11,background:'var(--bg4)',
              border:'1px solid var(--border-md)',color:'var(--text2)',
              opacity:pg===0?0.35:1,cursor:pg===0?'default':'pointer'}}>‹ Prev</button>
          <button disabled={pg>=pages-1} onClick={()=>setPage(p=>p+1)}
            style={{padding:'4px 9px',borderRadius:5,fontSize:11,background:'var(--bg4)',
              border:'1px solid var(--border-md)',color:'var(--text2)',
              opacity:pg>=pages-1?0.35:1,cursor:pg>=pages-1?'default':'pointer'}}>Next ›</button>
        </div>
      </div>
    </div>
  );
}

function PcapAttackersTab({ topIps, onInvestigate }) {
  const thS={padding:'8px 12px',textAlign:'left',fontSize:10,fontWeight:600,color:'var(--text2)',
    letterSpacing:'.08em',textTransform:'uppercase',borderBottom:'1px solid var(--border)',background:'var(--bg2)'};
  const tdS={padding:'8px 12px',borderBottom:'1px solid var(--border)',fontSize:12,color:'var(--text1)',verticalAlign:'middle'};
  if(!topIps.length) return <div style={{padding:40,textAlign:'center',color:'var(--text3)',fontSize:12}}>No attacking IPs detected</div>;
  return (
    <div style={{overflowY:'auto',height:'100%'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead>
          <tr>
            {['#','Source IP','Worst Sev','Score','Alerts','Categories','Rules'].map(h=>(
              <th key={h} style={thS}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {topIps.map((ip,i)=>{
            const sc=ip.score;
            const sc_c=sc>=80?'var(--red)':sc>=50?'var(--orange)':sc>=30?'var(--amber)':'var(--text3)';
            return (
              <tr key={ip.ip} onClick={()=>onInvestigate(ip.ip)}
                style={{cursor:'pointer',transition:'background .1s'}}
                onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,0.025)'}
                onMouseLeave={e=>e.currentTarget.style.background=''}>
                <td style={{...tdS,fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:'var(--text3)'}}>{i+1}</td>
                <td style={{...tdS,fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:'var(--cyan)',fontWeight:600}}>{ip.ip}</td>
                <td style={tdS}><PcapSevBadge sev={ip.worst_sev}/></td>
                <td style={tdS}>
                  <div style={{display:'flex',alignItems:'center',gap:7}}>
                    <div style={{flex:1,height:4,background:'var(--bg5)',borderRadius:2,overflow:'hidden',maxWidth:60}}>
                      <div style={{height:'100%',borderRadius:2,background:sc_c,width:`${sc}%`}}/>
                    </div>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:600,
                      color:sc_c,minWidth:26,textAlign:'right'}}>{sc}</span>
                  </div>
                </td>
                <td style={{...tdS,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{ip.count}</td>
                <td style={{...tdS,fontSize:11,color:'var(--text2)'}}>{ip.categories.join(', ')}</td>
                <td style={{...tdS,fontFamily:"'JetBrains Mono',monospace",color:'var(--text3)'}}>{ip.rules.length}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function PcapTimelineTab({ data }) {
  const tl = data.timeline;
  const canvasRef = useRef(null);
  const CHART_TOOLTIP = {backgroundColor:'rgba(9,12,22,0.95)',borderColor:'rgba(255,255,255,0.1)',
    borderWidth:1,titleColor:'#eef2f8',bodyColor:'#8fa3be',padding:10,cornerRadius:8};
  useChartJs(canvasRef, ()=>!tl.length?null:({
    type:'bar',
    data:{
      labels:tl.map(t=>t.t.replace('T',' ')),
      datasets:PCAP_SEV_ORDER.filter(s=>tl.some(t=>t[s]>0)).map(s=>({
        label:s,data:tl.map(t=>t[s]||0),
        backgroundColor:PCAP_SEV_COLORS[s]+'bb',borderColor:PCAP_SEV_COLORS[s],
        borderWidth:1,borderRadius:2,stack:'alerts',
      }))
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#8fa3be',font:{size:11}},position:'top'},tooltip:CHART_TOOLTIP},
      scales:{
        x:{stacked:true,ticks:{color:'#4e6278',maxRotation:45,font:{size:9}},
          grid:{color:'rgba(255,255,255,0.04)'},border:{display:false}},
        y:{stacked:true,ticks:{color:'#4e6278',maxTicksLimit:5},
          grid:{color:'rgba(255,255,255,0.04)'},border:{display:false}},
      }}
  }));

  const topBuckets = [...tl]
    .sort((a,b)=>(b.CRITICAL*4+b.HIGH*2+b.MEDIUM)-(a.CRITICAL*4+a.HIGH*2+a.MEDIUM))
    .slice(0,5).filter(t=>t.CRITICAL+t.HIGH+t.MEDIUM+t.LOW>0);

  const thS={padding:'8px 12px',textAlign:'left',fontSize:10,fontWeight:600,color:'var(--text2)',
    letterSpacing:'.08em',textTransform:'uppercase',borderBottom:'1px solid var(--border)',background:'var(--bg2)'};
  const tdS={padding:'8px 12px',borderBottom:'1px solid var(--border)',fontSize:12,fontFamily:"'JetBrains Mono',monospace"};

  return (
    <div style={{padding:16,display:'flex',flexDirection:'column',gap:14,overflowY:'auto',height:'100%'}}>
      <PcapBox title="Alert Timeline — by minute">
        <div style={{position:'relative',height:260}}>
          {tl.length?<canvas ref={canvasRef}/>:
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',
              color:'var(--text3)',fontSize:12}}>No timeline data</div>}
        </div>
      </PcapBox>
      {topBuckets.length>0&&(
        <PcapBox title="Busiest Minutes">
          <table style={{width:'100%',borderCollapse:'collapse',marginTop:-6}}>
            <thead><tr>{['Minute','Critical','High','Medium','Low','Total'].map(h=><th key={h} style={thS}>{h}</th>)}</tr></thead>
            <tbody>
              {topBuckets.map(t=>(
                <tr key={t.t}>
                  <td style={{...tdS,color:'var(--text1)'}}>{t.t.replace('T',' ')}</td>
                  <td style={{...tdS,fontWeight:700,color:'var(--red)'}}>{t.CRITICAL||0}</td>
                  <td style={{...tdS,fontWeight:700,color:'var(--orange)'}}>{t.HIGH||0}</td>
                  <td style={{...tdS,color:'var(--amber)'}}>{t.MEDIUM||0}</td>
                  <td style={{...tdS,color:'var(--blue)'}}>{t.LOW||0}</td>
                  <td style={{...tdS,fontWeight:700}}>{t.CRITICAL+t.HIGH+t.MEDIUM+t.LOW}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </PcapBox>
      )}
    </div>
  );
}

      <div style={{position:'fixed',top:0,right:0,bottom:0,width:420,zIndex:200,

                <div style={{fontSize:9,fontWeight:600,color:'var(--text3)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:8}}>Severity Breakdown</div>
                {PCAP_SEV_ORDER.filter(s=>d.by_sev[s]).map(s=>(
                  <div key={s} style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
                    <PcapSevBadge sev={s}/>
                    <div style={{flex:1,height:4,background:'var(--bg5)',borderRadius:2,overflow:'hidden'}}>
                      <div style={{height:'100%',background:PCAP_SEV_COLORS[s],borderRadius:2,
                        width:`${Math.round((d.by_sev[s]/d.total)*100)}%`}}/>
                    </div>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:'var(--text2)',
                      minWidth:26,textAlign:'right'}}>{d.by_sev[s]}</span>
                  </div>
                ))}
              </div>
              <div>
                <div style={{fontSize:9,fontWeight:600,color:'var(--text3)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:8}}>
                  Rules Triggered ({Object.keys(d.by_rule).length})
                </div>
                {Object.entries(d.by_rule).slice(0,10).map(([rule,count])=>(
                  <div key={rule} style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                    padding:'5px 0',borderBottom:'1px solid var(--border)',fontSize:11,gap:8}}>
                    <span style={{color:'var(--text1)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{rule}</span>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:'var(--text3)',flexShrink:0}}>{count}</span>
                  </div>
                ))}
              </div>

        </div>
