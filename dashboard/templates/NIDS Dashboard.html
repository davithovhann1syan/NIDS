<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NIDS — Network Intrusion Detection System</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<!-- support files -->
<script src="nids-data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="nids-ui.jsx"></script>
<script type="text/babel" src="nids-charts.jsx"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg0:#060810; --bg1:#090c16; --bg2:#0d1220; --bg3:#111828; --bg4:#16202e; --bg5:#1c2a3c;
  --border:rgba(255,255,255,0.06); --border-md:rgba(255,255,255,0.1); --border-hi:rgba(255,255,255,0.16);
  --text0:#eef2f8; --text1:#8fa3be; --text2:#4e6278; --text3:#2d3f52;
  --cyan:#00d4ff; --green:#00dfa0; --red:#ff3355; --orange:#ff7c2a; --amber:#ffbe2e; --blue:#4a8fff; --purple:#9b6fff;
}
html,body { height:100%; overflow:hidden; background:var(--bg0); color:var(--text0); font-family:'Inter',sans-serif; font-size:13px; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0; background-image:radial-gradient(circle,rgba(0,212,255,0.035) 1px,transparent 1px); background-size:28px 28px; }
::-webkit-scrollbar { width:3px; height:3px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--bg5); border-radius:2px; }
button { cursor:pointer; border:none; background:none; color:inherit; font:inherit; }
input,select { font:inherit; color:inherit; background:var(--bg4); border:1px solid var(--border-md); border-radius:6px; padding:5px 10px; outline:none; transition:border-color .15s,box-shadow .15s; }
input:focus,select:focus { border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,212,255,0.1); }
select option { background:var(--bg3); }
@keyframes nids-pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
@keyframes nids-glow-pulse { 0%,100%{box-shadow:0 0 14px rgba(255,51,85,0.18)}50%{box-shadow:0 0 32px rgba(255,51,85,0.38)} }
@keyframes nids-toast-in { from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none} }
@keyframes nids-ring-pulse { 0%,100%{opacity:0.35;transform:scale(1)}50%{opacity:0.1;transform:scale(1.4)} }
@keyframes nids-row-in { from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none} }
tbody tr { transition:background .1s; }
tbody tr:hover { background:rgba(255,255,255,0.025) !important; }
</style>
</head>
<body>
<div id="root" style="position:relative;z-index:1;height:100vh;"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
const NAV = [
  { id:"dashboard", label:"Dashboard",   icon:<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6" width="16" height="16"><rect x="2" y="2" width="6" height="6" rx="1.5"/><rect x="12" y="2" width="6" height="6" rx="1.5"/><rect x="2" y="12" width="6" height="6" rx="1.5"/><rect x="12" y="12" width="6" height="6" rx="1.5"/></svg> },
  { id:"alerts",    label:"Alert Feed",  icon:<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6" width="16" height="16"><path d="M8.57 3.22L2 14a1.67 1.67 0 001.43 2.5H16.57A1.67 1.67 0 0018 14L11.43 3.22a1.67 1.67 0 00-2.86 0z"/><line x1="10" y1="8" x2="10" y2="11"/><circle cx="10" cy="13.5" r=".75" fill="currentColor"/></svg> },
  { id:"map",       label:"Attack Map",  icon:<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6" width="16" height="16"><circle cx="10" cy="10" r="8"/><path d="M2 10h16M10 2a14.5 14.5 0 000 16M10 2a14.5 14.5 0 010 16"/></svg> },
  { id:"rules",     label:"Rules",       icon:<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6" width="16" height="16"><path d="M10 18s7-3.5 7-8.75V4.25L10 2 3 4.25V9.25C3 14.5 10 18 10 18z"/></svg> },
  { id:"analytics", label:"Analytics",   icon:<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6" width="16" height="16"><polyline points="18 10 15 10 12.5 17.5 7.5 2.5 5 10 2 10"/></svg> },
];

function Sidebar({ active, setActive, critCount, blockedCount }) {
  return (
    <div style={{width:196,background:"var(--bg1)",borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",flexShrink:0}}>
      {/* Brand */}
      <div style={{height:52,display:"flex",alignItems:"center",gap:10,padding:"0 16px",borderBottom:"1px solid var(--border)",flexShrink:0}}>
        <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <circle cx="12" cy="12" r="9" stroke="#00d4ff" strokeWidth="1.5"/>
          <circle cx="12" cy="12" r="5" stroke="#00d4ff" strokeWidth="1" strokeDasharray="2 2"/>
          <circle cx="12" cy="12" r="2" fill="#00d4ff"/>
          <line x1="12" y1="3" x2="12" y2="7" stroke="#00d4ff" strokeWidth="1.5"/>
          <line x1="21" y1="12" x2="17" y2="12" stroke="#00d4ff" strokeWidth="1.5"/>
        </svg>
        <div>
          <div style={{fontSize:11,fontWeight:700,color:"var(--text0)",letterSpacing:"0.08em",fontFamily:"'JetBrains Mono',monospace"}}>NIDS</div>
          <div style={{fontSize:9,color:"var(--text2)",letterSpacing:"0.1em",textTransform:"uppercase"}}>v3.0 · Signature-based</div>
        </div>
      </div>

      {/* Nav */}
      <div style={{padding:"12px 8px",flex:1,display:"flex",flexDirection:"column",gap:2,overflowY:"auto"}}>
        <div style={{fontSize:9,color:"var(--text3)",letterSpacing:"0.12em",textTransform:"uppercase",padding:"4px 8px",marginBottom:3}}>Views</div>
        {NAV.map((n,i)=>(
          <button key={n.id} onClick={()=>setActive(n.id)} style={{
            display:"flex",alignItems:"center",gap:9,padding:"8px 10px",borderRadius:7,textAlign:"left",
            color:active===n.id?"var(--cyan)":"var(--text2)",
            background:active===n.id?"rgba(0,212,255,0.08)":"transparent",
            border:`1px solid ${active===n.id?"rgba(0,212,255,0.2)":"transparent"}`,
            transition:"all .15s",fontSize:12,fontWeight:active===n.id?600:400,
          }}>
            <span style={{flexShrink:0}}>{n.icon}</span>
            <span style={{flex:1}}>{n.label}</span>
            {n.id==="alerts"&&critCount>0&&<span style={{background:"var(--red)",color:"#fff",fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:10,fontFamily:"'JetBrains Mono',monospace"}}>{critCount}</span>}
            {n.id==="rules"&&<span style={{color:"var(--text3)",fontSize:9,fontFamily:"'JetBrains Mono',monospace"}}>{i===3?"47":""}</span>}
          </button>
        ))}

        <div style={{marginTop:12,fontSize:9,color:"var(--text3)",letterSpacing:"0.12em",textTransform:"uppercase",padding:"4px 8px",marginBottom:3}}>System</div>
        {[
          {label:"Blocked IPs", val:blockedCount, color:"var(--red)", icon:<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" width="15" height="15"><circle cx="8" cy="8" r="6"/><line x1="4.5" y1="4.5" x2="11.5" y2="11.5"/></svg>},
          {label:"72 Rules",    val:"active",      color:"var(--green)", icon:<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" width="15" height="15"><path d="M8 14s5-2.5 5-6.25V3L8 1.5 3 3v4.75C3 11.5 8 14 8 14z"/></svg>},
          {label:"Queue",       val:"eth0",        color:"var(--cyan)",  icon:<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" width="15" height="15"><rect x="2" y="4" width="12" height="2.5" rx="1"/><rect x="2" y="8" width="9" height="2.5" rx="1"/><rect x="2" y="12" width="6" height="2.5" rx="1"/></svg>},
        ].map(item=>(
          <div key={item.label} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 10px",borderRadius:7,color:"var(--text2)",fontSize:11}}>
            <span style={{color:item.color,opacity:0.8,flexShrink:0}}>{item.icon}</span>
            <span style={{flex:1}}>{item.label}</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:item.color,fontWeight:600}}>{item.val}</span>
          </div>
        ))}
      </div>

      {/* Footer */}
      <div style={{padding:"12px 14px",borderTop:"1px solid var(--border)"}}>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
          <LiveDot color="var(--green)" size={7}/>
          <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,color:"var(--green)"}}>ENGINE RUNNING</span>
        </div>
        <div style={{fontSize:9,color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace",lineHeight:1.6}}>
          Scapy 2.5 · Flask 3.0<br/>Thread 1/2/3 active
        </div>
      </div>
    </div>
  );
}

// ─── HEADER ───────────────────────────────────────────────────────────────────
function Header({ active, paused, onExport, onShortcuts }) {
  const [clock,setClock]=useState(new Date());
  useEffect(()=>{const iv=setInterval(()=>setClock(new Date()),1000);return()=>clearInterval(iv);},[]);
  const titles={dashboard:"Overview",alerts:"Alert Feed",map:"Attack Map",rules:"Rule Coverage",analytics:"Analytics"};
  return (
    <div style={{height:52,background:"var(--bg2)",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",padding:"0 20px",gap:14,flexShrink:0}}>
      <h1 style={{fontSize:15,fontWeight:700,color:"var(--text0)",flex:1}}>{titles[active]||"Dashboard"}</h1>

      {/* Sev legend */}
      <div style={{display:"flex",gap:14}}>
        {Object.entries(NIDS_SEV).map(([k,v])=>(
          <div key={k} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:"var(--text2)"}}>
            <span style={{width:6,height:6,borderRadius:1,background:v.color,display:"inline-block"}}/>
            {k}
          </div>
        ))}
      </div>

      <div style={{width:1,height:18,background:"var(--border-md)"}}/>

      {/* Action buttons */}
      <button onClick={onExport} title="Export CSV (E)" style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:6,background:"var(--bg4)",border:"1px solid var(--border-md)",color:"var(--text1)",fontSize:11,fontWeight:500}}>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" width="13" height="13"><path d="M8 2v8M5 7l3 3 3-3"/><path d="M3 11v2h10v-2"/></svg>
        Export
      </button>
      <button onClick={onShortcuts} title="Shortcuts (?)" style={{display:"flex",alignItems:"center",justifyContent:"center",width:30,height:30,borderRadius:6,background:"var(--bg4)",border:"1px solid var(--border-md)",color:"var(--text1)",fontSize:12,fontWeight:600}}>?</button>

      <div style={{width:1,height:18,background:"var(--border-md)"}}/>

      {/* Live indicator */}
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <LiveDot color={paused?"var(--amber)":"var(--green)"} size={7} animate={!paused}/>
        <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,color:paused?"var(--amber)":"var(--green)",letterSpacing:"0.1em"}}>{paused?"PAUSED":"LIVE"}</span>
      </div>

      <div style={{width:1,height:18,background:"var(--border-md)"}}/>
      <div style={{fontFamily:"'JetBrains Mono',monospace",textAlign:"right",lineHeight:1.5}}>
        <div style={{fontSize:11,color:"var(--text1)"}}>{clock.toLocaleTimeString("en-US",{hour12:false})}</div>
        <div style={{fontSize:9,color:"var(--text3)"}}>{clock.toLocaleDateString("en-US",{dateStyle:"medium"})}</div>
      </div>
    </div>
  );
}

// ─── STATUS BAR ───────────────────────────────────────────────────────────────
function StatusBar({ queuePct, dropRate, uptime, pktRate }) {
  const items=[
    {l:"INTERFACE", v:"eth0",           ok:true},
    {l:"QUEUE",     v:`${queuePct}%`,   ok:queuePct<80, warn:queuePct>=50},
    {l:"DROP RATE", v:`${dropRate}%`,   ok:parseFloat(dropRate)<1},
    {l:"UPTIME",    v:uptime,           ok:true},
    {l:"PKT/S",     v:pktRate,          ok:pktRate<400},
    {l:"THREADS",   v:"3/3",            ok:true},
    {l:"LOG",       v:"nids.log",       ok:true},
  ];
  return (
    <div style={{height:30,background:"var(--bg1)",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",padding:"0 20px",gap:0,overflowX:"auto",flexShrink:0}}>
      {items.map((item,i)=>(
        <React.Fragment key={item.l}>
          {i>0&&<div style={{width:1,height:13,background:"var(--border-md)",margin:"0 13px"}}/>}
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            <span style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:"var(--text3)",letterSpacing:"0.1em"}}>{item.l}</span>
            <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,color:!item.ok?"var(--red)":item.warn?"var(--amber)":"var(--text1)"}}>{item.v}</span>
          </div>
        </React.Fragment>
      ))}
      <div style={{flex:1}}/>
      <div style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:"var(--text3)"}}>Python 3.10 · Scapy 2.5 · Flask 3.0</div>
    </div>
  );
}

// ─── THREAT POSTURE ───────────────────────────────────────────────────────────
function ThreatPosture({ alerts }) {
  const recent=alerts.filter(a=>Date.now()-new Date(a.timestamp)<3600000);
  const crit=recent.filter(a=>a.severity==="CRITICAL").length;
  const high=recent.filter(a=>a.severity==="HIGH").length;
  const level=crit>5?"CRITICAL":crit>0?"HIGH":high>10?"HIGH":high>3?"ELEVATED":"NORMAL";
  const cfg={
    CRITICAL:{color:"var(--red)",   desc:"Active critical threats — immediate response required"},
    HIGH:    {color:"var(--orange)",desc:"High-severity events in the last hour"},
    ELEVATED:{color:"var(--amber)", desc:"Elevated activity — monitoring closely"},
    NORMAL:  {color:"var(--green)", desc:"No critical threats detected"},
  }[level];
  return (
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"9px 16px",background:`${cfg.color}08`,border:`1px solid ${cfg.color}30`,borderRadius:8}}>
      <LiveDot color={cfg.color} size={9} animate={level!=="NORMAL"}/>
      <div style={{flex:1}}>
        <span style={{fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:cfg.color,letterSpacing:"0.08em"}}>THREAT LEVEL: {level}</span>
        <span style={{fontSize:10,color:"var(--text2)",marginLeft:10}}>{cfg.desc} · {recent.length} events/hr</span>
      </div>
      {[["CRIT",crit,"var(--red)"],["HIGH",high,"var(--orange)"],["MED",recent.filter(a=>a.severity==="MEDIUM").length,"var(--amber)"]].map(([l,v,c])=>(
        <div key={l} style={{textAlign:"center",minWidth:36}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:700,color:v>0?c:"var(--text3)",lineHeight:1}}>{v}</div>
          <div style={{fontSize:9,color:"var(--text3)",marginTop:1}}>{l}</div>
        </div>
      ))}
    </div>
  );
}

// ─── TOP ATTACKERS ────────────────────────────────────────────────────────────
function TopAttackers({ alerts, onInvestigate }) {
  const top=useMemo(()=>{
    const m={};
    alerts.forEach(a=>{
      if(!m[a.src_ip])m[a.src_ip]={ip:a.src_ip,count:0,crit:0,country:a.src_country||"?"};
      m[a.src_ip].count++;
      if(a.severity==="CRITICAL")m[a.src_ip].crit++;
    });
    return Object.values(m).sort((a,b)=>b.count-a.count).slice(0,6);
  },[alerts]);
  const max=top[0]?.count||1;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:7}}>
      {top.map((item,i)=>(
        <div key={item.ip} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}} onClick={()=>onInvestigate&&onInvestigate(item.ip)}>
          <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:"var(--text3)",width:13,textAlign:"right",flexShrink:0}}>{i+1}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"var(--cyan)",fontWeight:500,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.ip}</span>
              <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                {item.crit>0&&<span style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:"var(--red)",background:"var(--red-d,rgba(255,51,85,0.1))",padding:"1px 4px",borderRadius:3,border:"1px solid rgba(255,51,85,0.25)"}}>{item.crit}×CRIT</span>}
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:600,color:"var(--text1)"}}>{item.count}</span>
              </div>
            </div>
            <div style={{height:3,background:"var(--bg5)",borderRadius:2}}>
              <div style={{height:3,background:"linear-gradient(90deg,#00a8cc,#00d4ff)",borderRadius:2,width:`${(item.count/max)*100}%`,opacity:0.7,transition:"width .4s"}}/>
            </div>
            <div style={{fontSize:9,color:"var(--text3)",marginTop:2,fontFamily:"'JetBrains Mono',monospace"}}>{item.country}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── ALERT ROW ────────────────────────────────────────────────────────────────
function AlertRow({ alert, isNew, blockedIPs, onBlock, onInvestigate }) {
  const [open,setOpen]=useState(false);
  const ts=new Date(alert.timestamp);
  const s=NIDS_SEV[alert.severity]||NIDS_SEV.LOW;
  const blocked=blockedIPs.has(alert.src_ip);

  const copyIP=useCallback(()=>{
    navigator.clipboard?.writeText(alert.src_ip).catch(()=>{});
  },[alert.src_ip]);

  return (
    <>
      <tr style={{
        cursor:"pointer",
        borderLeft:`2px solid ${isNew?s.color:"transparent"}`,
        background:isNew?s.bg:"transparent",
        transition:"background .5s,border-color .5s",
        animation:isNew?"nids-row-in .25s ease":"none",
        opacity:blocked?0.5:1,
      }}>
        <td onClick={()=>setOpen(o=>!o)} style={{padding:"7px 8px 7px 14px",width:82,fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"var(--text2)",whiteSpace:"nowrap"}}>
          <div style={{color:"var(--text1)"}}>{ts.toLocaleTimeString("en-US",{hour12:false})}</div>
          <div style={{fontSize:9,marginTop:1}}>{ts.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
        </td>
        <td onClick={()=>setOpen(o=>!o)} style={{padding:"7px 6px",width:50}}><SevBadge sev={alert.severity}/></td>
        <td onClick={()=>setOpen(o=>!o)} style={{padding:"7px 8px",maxWidth:180}}>
          <div style={{fontWeight:500,fontSize:12,color:"var(--text0)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{alert.rule}</div>
          <div style={{marginTop:2}}><CatChip cat={alert.category}/></div>
        </td>
        <td style={{padding:"7px 8px"}}>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"var(--cyan)",fontWeight:500,cursor:"pointer"}} onClick={()=>onInvestigate(alert.src_ip)}>{alert.src_ip}</span>
            {blocked&&<BlockedBadge/>}
          </div>
          {alert.src_country&&<div style={{fontSize:9,color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace"}}>{alert.src_country}</div>}
        </td>
        <td onClick={()=>setOpen(o=>!o)} style={{padding:"7px 8px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"var(--text1)"}}>{alert.dst_ip}</td>
        <td onClick={()=>setOpen(o=>!o)} style={{padding:"7px 8px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"var(--text2)"}}>{alert.dst_port||"—"}</td>
        <td onClick={()=>setOpen(o=>!o)} style={{padding:"7px 8px",fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"var(--text2)"}}>{alert.protocol}</td>
        <td onClick={()=>setOpen(o=>!o)} style={{padding:"7px 8px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"var(--text2)"}}>{alert.count!=null?alert.count:"—"}</td>
        <td onClick={()=>setOpen(o=>!o)} style={{padding:"7px 14px 7px 4px",width:20,color:"var(--text3)"}}>
          <svg viewBox="0 0 12 12" fill="none" width="10" height="10" style={{transform:open?"rotate(90deg)":"none",transition:"transform .15s"}}>
            <path d="M4 2l4 4-4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
          </svg>
        </td>
      </tr>
      {open&&(
        <tr>
          <td colSpan={9} style={{padding:"0 14px 10px 14px",background:"var(--bg2)"}}>
            <div style={{background:"var(--bg4)",border:`1px solid ${s.color}40`,borderRadius:8,padding:"14px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                <SevBadge sev={alert.severity}/>
                <span style={{fontWeight:600,fontSize:12,color:"var(--text0)",flex:1}}>{alert.rule}</span>
                <span style={{fontSize:10,color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace"}}>#{alert.id}</span>
                {/* Action buttons */}
                <button onClick={()=>onInvestigate(alert.src_ip)} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:5,background:"rgba(0,212,255,0.1)",border:"1px solid rgba(0,212,255,0.25)",color:"var(--cyan)",fontSize:11}}>
                  <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5" width="11" height="11"><circle cx="6" cy="6" r="4"/><path d="M10 10l2.5 2.5"/></svg> Investigate
                </button>
                <button onClick={()=>onBlock(alert.src_ip)} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:5,background:blocked?"rgba(0,223,160,0.1)":"rgba(255,51,85,0.1)",border:`1px solid ${blocked?"rgba(0,223,160,0.25)":"rgba(255,51,85,0.25)"}`,color:blocked?"var(--green)":"var(--red)",fontSize:11}}>
                  {blocked?"✓ Unblock":"⊘ Block IP"}
                </button>
                <button onClick={copyIP} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:5,background:"var(--bg5)",border:"1px solid var(--border-md)",color:"var(--text1)",fontSize:11}}>
                  <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5" width="11" height="11"><rect x="4" y="4" width="8" height="8" rx="1"/><path d="M2 10V2h8"/></svg> Copy IP
                </button>
              </div>
              {/* JSON-style detail */}
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"var(--text1)",lineHeight:1.9,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:"0 24px"}}>
                {[
                  ["timestamp", ts.toISOString(), "var(--green)"],
                  ["src_ip",    alert.src_ip,     "var(--cyan)"],
                  ["src_country",alert.src_country,"var(--text1)"],
                  ["dst_ip",    alert.dst_ip,     "var(--text0)"],
                  ["dst_port",  alert.dst_port||"n/a","var(--text0)"],
                  ["protocol",  alert.protocol,   "var(--blue)"],
                  ["rule",      alert.rule,        "var(--text0)"],
                  ["severity",  alert.severity,    s.color],
                  ["category",  alert.category,    NIDS_CAT_COLOR[alert.category]||"var(--text1)"],
                  ["type",      alert.type,        "var(--text1)"],
                  ...(alert.count!=null?[["count",alert.count,"var(--text0)"]]:[] ),
                  ["ttl",       alert.ttl,         "var(--text2)"],
                  ["length",    alert.length+" bytes","var(--text2)"],
                ].map(([k,v,c])=>(
                  <div key={k}>
                    <span style={{color:"var(--text3)"}}>{k.padEnd(14)}</span>
                    <span style={{color:c}}>{v}</span>
                  </div>
                ))}
              </div>
            </div>
          </td>
        </tr>
      )}
    </>
  );
}

// ─── ALERT TABLE ──────────────────────────────────────────────────────────────
function AlertTable({ alerts, paused, setPaused, filter, setFilter, newIds, maxRows, blockedIPs, onBlock, onInvestigate, ruleSearchRef }) {
  const filtered=useMemo(()=>alerts.filter(a=>{
    if(filter.sev&&a.severity!==filter.sev)return false;
    if(filter.cat&&a.category!==filter.cat)return false;
    if(filter.ip&&!a.src_ip.includes(filter.ip)&&!a.dst_ip.includes(filter.ip))return false;
    if(filter.rule&&!a.rule.toLowerCase().includes(filter.rule.toLowerCase()))return false;
    return true;
  }),[alerts,filter]);

  const cats=useMemo(()=>[...new Set(NIDS_RULES.map(r=>r.cat))],[]);

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      {/* Filter bar */}
      <div style={{display:"flex",gap:8,padding:"9px 14px",borderBottom:"1px solid var(--border)",alignItems:"center",flexShrink:0,background:"var(--bg3)",flexWrap:"wrap"}}>
        <select value={filter.sev} onChange={e=>setFilter(f=>({...f,sev:e.target.value}))} style={{fontSize:11,height:28,padding:"0 8px"}}>
          <option value="">All Severities</option>
          {["CRITICAL","HIGH","MEDIUM","LOW"].map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <select value={filter.cat} onChange={e=>setFilter(f=>({...f,cat:e.target.value}))} style={{fontSize:11,height:28,padding:"0 8px"}}>
          <option value="">All Categories</option>
          {cats.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <input ref={ruleSearchRef} placeholder="Rule…" value={filter.rule} onChange={e=>setFilter(f=>({...f,rule:e.target.value}))} style={{fontSize:11,height:28,width:140}}/>
        <input placeholder="IP address…" value={filter.ip} onChange={e=>setFilter(f=>({...f,ip:e.target.value}))} style={{fontSize:11,height:28,width:130,fontFamily:"'JetBrains Mono',monospace"}}/>
        <button onClick={()=>setFilter({sev:"",cat:"",ip:"",rule:""})} style={{fontSize:10,color:"var(--text2)",padding:"0 8px",height:28,borderRadius:6,border:"1px solid var(--border-md)",background:"var(--bg4)"}}>Clear (C)</button>
        <div style={{flex:1}}/>
        <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:"var(--text2)"}}>{filtered.length.toLocaleString()} events</span>
        <button onClick={()=>nidsExportCSV(filtered)} style={{display:"flex",alignItems:"center",gap:4,padding:"0 10px",height:28,borderRadius:6,fontSize:11,background:"var(--bg4)",border:"1px solid var(--border-md)",color:"var(--text1)"}}>
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5" width="11" height="11"><path d="M7 2v6M5 6l2 2 2-2"/><path d="M2 10v2h10v-2"/></svg>CSV
        </button>
        <button onClick={()=>setPaused(p=>!p)} style={{display:"flex",alignItems:"center",gap:5,padding:"0 12px",height:28,borderRadius:6,fontSize:11,fontWeight:600,background:paused?"rgba(255,190,46,0.1)":"rgba(0,223,160,0.1)",border:`1px solid ${paused?"rgba(255,190,46,0.35)":"rgba(0,223,160,0.35)"}`,color:paused?"var(--amber)":"var(--green)"}}>
          {paused?<><svg viewBox="0 0 12 12" fill="currentColor" width="9" height="9"><polygon points="2,1 11,6 2,11"/></svg>RESUME</>:<><svg viewBox="0 0 12 12" fill="currentColor" width="9" height="9"><rect x="1" y="1" width="4" height="10"/><rect x="7" y="1" width="4" height="10"/></svg>PAUSE</>}
        </button>
      </div>
      {/* Table */}
      <div style={{overflowY:"auto",flex:1}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead>
            <tr style={{position:"sticky",top:0,background:"var(--bg2)",zIndex:2}}>
              {["TIME","SEV","RULE / CATEGORY","SRC IP","DST IP","PORT","PROTO","COUNT",""].map((h,i)=>(
                <th key={i} style={{padding:`7px ${i===0?"14px":"8px"}`,textAlign:"left",fontSize:9,fontWeight:600,color:"var(--text3)",letterSpacing:"0.1em",textTransform:"uppercase",borderBottom:"1px solid var(--border)",whiteSpace:"nowrap"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.slice(0,maxRows).map(a=>(
              <AlertRow key={a.id} alert={a} isNew={newIds.has(a.id)} blockedIPs={blockedIPs} onBlock={onBlock} onInvestigate={onInvestigate}/>
            ))}
            {filtered.length===0&&(
              <tr><td colSpan={9} style={{textAlign:"center",padding:"48px",color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>No alerts match filters</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── VIEWS ────────────────────────────────────────────────────────────────────
function DashboardView({ alerts, paused, setPaused, filter, setFilter, newIds, tweaks, blockedIPs, onBlock, onInvestigate, ruleSearchRef, pktRate }) {
  const crit=alerts.filter(a=>a.severity==="CRITICAL").length;
  const high=alerts.filter(a=>a.severity==="HIGH").length;
  const today=useMemo(()=>alerts.filter(a=>new Date(a.timestamp).toDateString()===new Date().toDateString()).length,[alerts]);
  const topIP=useMemo(()=>{const m={};alerts.forEach(a=>{m[a.src_ip]=(m[a.src_ip]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1])[0]?.[0]||"—";},[alerts]);
  const spark=useMemo(()=>{const b=Array(12).fill(0);const now=Date.now();alerts.forEach(a=>{const h=Math.floor((now-new Date(a.timestamp))/3600000);if(h<12)b[11-h]++;});return b;},[alerts]);
  const topIPs=useMemo(()=>{const m={};alerts.forEach(a=>{m[a.src_ip]=(m[a.src_ip]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([ip,count])=>({ip,count}));},[alerts]);

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      {/* Stat cards */}
      <div style={{padding:"12px 20px 0",display:"flex",gap:10,flexShrink:0}}>
        <StatCard label="Alerts Today" value={today} color="var(--text0)" spark={spark} sub="rolling 24h"/>
        <StatCard label="Critical" value={crit} color="#ff3355" glow={crit>0} trend={crit>0?12:null} sub={crit>0?"Requires attention":"Clear"} spark={spark.map(v=>Math.round(v*0.18))}/>
        <StatCard label="High" value={high} color="#ff7c2a" glow={high>5} sub={`${alerts.filter(a=>a.severity==="HIGH"&&Date.now()-new Date(a.timestamp)<3600000).length} in last hr`}/>
        <StatCard label="Top Attacker" value={topIP} color="var(--cyan)" sub="by alert count" icon={<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4" width="14" height="14"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3 2.7-5 6-5s6 2 6 5"/></svg>}/>
        <div style={{flex:"0 0 auto",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:10,padding:"14px 16px",display:"flex",flexDirection:"column",gap:4,minWidth:110}}>
          <span style={{fontSize:10,fontWeight:600,color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.1em"}}>Packet Rate</span>
          <PacketRateGauge rate={pktRate}/>
        </div>
      </div>

      {/* Threat posture */}
      <div style={{padding:"10px 20px 0",flexShrink:0}}><ThreatPosture alerts={alerts}/></div>

      {/* Charts */}
      <div style={{padding:"10px 20px 0",display:"grid",gridTemplateColumns:"1fr 210px",gap:10,flexShrink:0}}>
        <ChartCard title="Alerts Over Time" subtitle="Last 24 hours · by hour">
          <div style={{height:120}}><TimelineChart alerts={alerts}/></div>
        </ChartCard>
        <ChartCard title="By Severity">
          <DonutChart alerts={alerts}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2px 8px",marginTop:6}}>
            {Object.entries(NIDS_SEV).map(([k,v])=>(
              <div key={k} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>
                <span style={{width:5,height:5,borderRadius:1,background:v.color,flexShrink:0}}/>
                <span style={{color:"var(--text3)",flex:1}}>{k.slice(0,4)}</span>
                <span style={{color:"var(--text1)",fontWeight:600}}>{alerts.filter(a=>a.severity===k).length}</span>
              </div>
            ))}
          </div>
        </ChartCard>
      </div>

      {/* Bottom: table + attackers */}
      <div style={{flex:1,overflow:"hidden",padding:"10px 20px 16px",display:"grid",gridTemplateColumns:"1fr 210px",gap:10,minHeight:0}}>
        <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:10,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          <AlertTable alerts={alerts} paused={paused} setPaused={setPaused} filter={filter} setFilter={setFilter} newIds={newIds} maxRows={tweaks?.maxRows||80} blockedIPs={blockedIPs} onBlock={onBlock} onInvestigate={onInvestigate} ruleSearchRef={ruleSearchRef}/>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10,overflow:"hidden"}}>
          <ChartCard title="Top Attackers" subtitle="click IP to investigate" style={{flex:"0 0 auto"}}>
            <TopAttackers alerts={alerts} onInvestigate={onInvestigate}/>
          </ChartCard>
          <ChartCard title="Top Source IPs" subtitle="by count" style={{flex:1,minHeight:0}}>
            <div style={{flex:1,minHeight:80}}><HBarChart data={topIPs} color="var(--cyan)" labelKey="ip" valueKey="count"/></div>
          </ChartCard>
        </div>
      </div>
    </div>
  );
}

function RulesView({ alerts }) {
  const counts=useMemo(()=>{const m={};alerts.forEach(a=>{m[a.rule]=(m[a.rule]||0)+1;});return m;},[alerts]);
  const maxC=Math.max(...Object.values(counts),1);
  const byCat=useMemo(()=>{const m={};NIDS_RULES.forEach(r=>{if(!m[r.cat])m[r.cat]=[];m[r.cat].push(r);});return Object.entries(m);},[]);
  return (
    <div style={{padding:20,height:"100%",overflowY:"auto"}}>
      <div style={{marginBottom:14}}>
        <h2 style={{fontSize:15,fontWeight:700,color:"var(--text0)"}}>Rule Coverage</h2>
        <p style={{fontSize:11,color:"var(--text2)",marginTop:3}}>{NIDS_RULES.length} signature rules · pattern + rate-based · no ML</p>
      </div>
      {byCat.map(([cat,rules])=>(
        <div key={cat} style={{marginBottom:18}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <span style={{width:8,height:8,borderRadius:2,background:NIDS_CAT_COLOR[cat]||"var(--text2)",flexShrink:0}}/>
            <span style={{fontSize:11,fontWeight:600,color:"var(--text1)",textTransform:"uppercase",letterSpacing:"0.08em"}}>{cat}</span>
            <span style={{fontSize:10,color:"var(--text3)"}}>{rules.length} rules</span>
            <span style={{fontSize:10,color:"var(--text3)",marginLeft:"auto"}}>{rules.reduce((s,r)=>s+(counts[r.name]||0),0)} total hits</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {rules.map(r=>{
              const c=counts[r.name]||0;
              const s=NIDS_SEV[r.sev];
              return (
                <div key={r.name} style={{background:"var(--bg3)",border:`1px solid ${c>0?"var(--border-md)":"var(--border)"}`,borderRadius:7,padding:"8px 12px",borderLeft:`2px solid ${c>0?s.color:"var(--bg5)"}`,display:"flex",alignItems:"center",gap:10}}>
                  <SevBadge sev={r.sev} small/>
                  <span style={{flex:1,fontSize:12,fontWeight:c>0?500:400,color:c>0?"var(--text0)":"var(--text2)"}}>{r.name}</span>
                  <span style={{fontSize:9,color:"var(--text3)",fontFamily:"'JetBrains Mono',monospace",background:"var(--bg5)",padding:"1px 6px",borderRadius:3}}>{r.type}</span>
                  {c>0&&<div style={{width:60,height:3,background:"var(--bg5)",borderRadius:2}}><div style={{height:3,background:s.color,borderRadius:2,width:`${(c/maxC)*100}%`,opacity:0.65}}/></div>}
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,color:c>0?s.color:"var(--text3)",width:28,textAlign:"right"}}>{c||"—"}</span>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

  const catData=useMemo(()=>{const m={};alerts.forEach(a=>{m[a.category]=(m[a.category]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([cat,count])=>({cat,count}));},[alerts]);

        })}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
        <ChartCard title="Top Source IPs"><div style={{height:210}}><HBarChart data={topIPs} color="var(--cyan)" labelKey="ip" valueKey="count"/></div></ChartCard>
        <ChartCard title="Top Target Ports"><div style={{height:210}}><HBarChart data={topPorts} color="var(--purple)" labelKey="port" valueKey="count"/></div></ChartCard>
        <ChartCard title="Top Rules"><div style={{height:210}}><HBarChart data={topRules} color="var(--orange)" labelKey="rule" valueKey="count"/></div></ChartCard>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [alerts,setAlerts]   = useState(()=>nidsGenHistory());
  const [newIds,setNewIds]   = useState(new Set());
  const [paused,setPaused]   = useState(false);
  const [nav,setNav]         = useState("dashboard");
  const [filter,setFilter]   = useState({sev:"",cat:"",ip:"",rule:""});
  const [uptime,setUptime]   = useState("0:00:00");
  const [queuePct,setQueue]  = useState(13);
  const [pktRate,setPktRate] = useState(87);
  const [toasts,setToasts]   = useState([]);
  const [blockedIPs,setBlockedIPs] = useState(new Set());
  const [showShortcuts,setShowShortcuts] = useState(false);
  const startRef  = useRef(Date.now());
  const ruleSearch= useRef(null);

  const [tweaks, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{
    "refreshInterval": 5,
    "maxRows": 80,
    "toastCritOnly": false,
    "compactMode": false
  }/*EDITMODE-END*/);
  const { TweaksPanel, TweakSection, TweakSlider, TweakToggle } = window;

  // Block / unblock
  const handleBlock=useCallback((ip)=>{
    setBlockedIPs(s=>{const n=new Set(s);n.has(ip)?n.delete(ip):n.add(ip);return n;});
  },[]);

  // Investigate IP — set filter + switch to alerts
  const handleInvestigate=useCallback((ip)=>{
    setFilter(f=>({...f,ip}));
    setNav("alerts");
  },[]);

  // Live feed
  useEffect(()=>{
    if(paused)return;
    const iv=setInterval(()=>{
      const n=Math.floor(Math.random()*3)+1;
      const batch=Array.from({length:n},()=>nidsGenAlert(new Date()));
      setAlerts(prev=>[...batch,...prev].slice(0,600));
      const ids=new Set(batch.map(a=>a.id));
      setNewIds(s=>new Set([...s,...ids]));
      setTimeout(()=>setNewIds(s=>{const c=new Set(s);ids.forEach(id=>c.delete(id));return c;}),3000);
      setQueue(q=>Math.max(2,Math.min(90,q+Math.round(Math.random()*8-4))));
      setPktRate(r=>Math.max(20,Math.min(580,r+Math.round(Math.random()*40-20))));
      // Toasts for CRITICAL/HIGH
      const noteworthy=batch.filter(a=>tweaks.toastCritOnly?a.severity==="CRITICAL":["CRITICAL","HIGH"].includes(a.severity));
      if(noteworthy.length)setToasts(t=>[...noteworthy.slice(0,2),...t].slice(0,5));
    },(tweaks.refreshInterval||5)*1000);
    return()=>clearInterval(iv);
  },[paused,tweaks.refreshInterval,tweaks.toastCritOnly]);

  // Auto-dismiss toasts
  useEffect(()=>{
    if(!toasts.length)return;
    const iv=setTimeout(()=>setToasts(t=>t.slice(0,-1)),6000);
    return()=>clearTimeout(iv);
  },[toasts]);

  // Uptime
  useEffect(()=>{
    const iv=setInterval(()=>{
      const s=Math.floor((Date.now()-startRef.current)/1000);
      setUptime(`${Math.floor(s/3600)}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`);
    },1000);
    return()=>clearInterval(iv);
  },[]);

  // Keyboard shortcuts
  useEffect(()=>{
    const h=e=>{
      if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT")return;
      switch(e.key.toLowerCase()){
        case "p": setPaused(x=>!x); break;
        case "e": nidsExportCSV(alerts); break;
        case "c": setFilter({sev:"",cat:"",ip:"",rule:""}); break;
        case "/": e.preventDefault(); ruleSearch.current?.focus(); break;
        case "?": setShowShortcuts(x=>!x); break;
        case "escape": setShowShortcuts(false); break;
        case "1": setNav("dashboard"); break;
        case "2": setNav("alerts"); break;
        case "3": setNav("map"); break;
        case "4": setNav("rules"); break;
        case "5": setNav("analytics"); break;
      }
    };
    window.addEventListener("keydown",h);
    return()=>window.removeEventListener("keydown",h);
  },[alerts]);

  const critCount=alerts.filter(a=>a.severity==="CRITICAL"&&Date.now()-new Date(a.timestamp)<3600000).length;
  const dropRate=(queuePct*0.017).toFixed(1);
  const viewProps={alerts,paused,setPaused,filter,setFilter,newIds,tweaks,blockedIPs,onBlock:handleBlock,onInvestigate:handleInvestigate,ruleSearchRef:ruleSearch,pktRate};

  return (
    <div style={{display:"flex",height:"100vh",width:"100vw",overflow:"hidden"}}>
      <Sidebar active={nav} setActive={setNav} critCount={critCount} blockedCount={blockedIPs.size}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
        <Header active={nav} paused={paused} onExport={()=>nidsExportCSV(alerts)} onShortcuts={()=>setShowShortcuts(x=>!x)}/>
        <StatusBar queuePct={queuePct} dropRate={dropRate} uptime={uptime} pktRate={pktRate}/>
        <div style={{flex:1,overflow:"hidden",background:"var(--bg2)"}}>
          {nav==="dashboard" && <DashboardView {...viewProps}/>}
          {nav==="alerts"    && <AlertsView    {...viewProps}/>}
          {nav==="map"       && <MapView alerts={alerts} onInvestigate={handleInvestigate}/>}
          {nav==="rules"     && <RulesView     alerts={alerts}/>}
          {nav==="analytics" && <AnalyticsView alerts={alerts}/>}
        </div>
      </div>

      <ToastContainer toasts={toasts} dismiss={id=>setToasts(t=>t.filter(x=>x.id!==id))}/>
      {showShortcuts&&<ShortcutsOverlay onClose={()=>setShowShortcuts(false)}/>}

      <TweaksPanel>
        <TweakSection title="Live Feed">
          <TweakSlider id="refreshInterval" label="Refresh (s)" min={1} max={60} step={1}/>
          <TweakSlider id="maxRows" label="Max Rows" min={20} max={300} step={10}/>
          <TweakToggle id="toastCritOnly" label="Toast: Critical only"/>
        </TweakSection>
        <TweakSection title="Display">
          <TweakToggle id="compactMode" label="Compact Mode"/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
